    <style>
        :root {
            --color-cyber-red: #ff0000;
            --color-dark-bg: #050505;
            --color-card-bg: #0a0a0a;
            --color-muted-text: #b0b0b0;
            --cyber-red: #ff1f2d;
            --cyber-dark: #040506;
            --cyber-card: #0b0c0f;
            --cyber-border: rgba(255, 31, 45, 0.28);
            --cyber-muted: #b6bcc7;
        }
        .text-cyber-red {
            color: var(--color-cyber-red);
        }
        .hover\:text-cyber-red:hover {
            color: var(--color-cyber-red);
        }
        .bg-cyber-red {
            background-color: var(--color-cyber-red);
        }
        .bg-dark-bg {
            background-color: var(--color-dark-bg);
        }
        .text-muted-text {
            color: var(--color-muted-text);
        }
        .font-sans {
            font-family: 'Inter', system-ui, 'Segoe UI', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 25% 10%, #171a20 0%, #070809 45%, #040506 100%);
            color: #f4f6fb;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100%;
        }

        .threat-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 20px;
        }

        .glass-card {
            background: linear-gradient(180deg, rgba(13, 15, 18, 0.9), rgba(8, 9, 12, 0.9));
            border: 1px solid var(--cyber-border);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03), 0 24px 60px rgba(0, 0, 0, 0.45);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 9999px;
            background: var(--cyber-red);
            box-shadow: 0 0 14px rgba(255, 31, 45, 0.8);
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.35); opacity: 1; }
        }

        #globe-wrap {
            height: 620px;
            position: relative;
            overflow: hidden;
        }

        #globe-stage {
            position: absolute;
            inset: 0;
        }

        #plane-stage {
            position: absolute;
            inset: 0;
            display: none;
            border-radius: 12px;
            overflow: hidden;
            background: #020304;
        }

        #plane-map {
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(255, 31, 45, 0.2);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 48px rgba(0, 0, 0, 0.65);
        }

        #plane-basemap {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.1)),
                url('/img/00/map/threat-map/textures/earth-blue-marble.jpg');
            background-size: 100% 100%, 100% 100%;
            background-position: center;
            filter: brightness(1.35) saturate(1.15) contrast(1.06);
        }

        #plane-labels {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .country-label {
            position: absolute;
            transform: translate(-50%, -50%);
            font-size: 10px;
            line-height: 1.1;
            color: #f6f8ff;
            text-shadow: 0 0 7px rgba(0, 0, 0, 0.95);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .country-label::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            margin-right: 5px;
            border-radius: 9999px;
            background: rgba(255, 132, 143, 0.9);
            box-shadow: 0 0 8px rgba(255, 31, 45, 0.85);
            vertical-align: middle;
        }

        #plane-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .plane-arc {
            fill: none;
            stroke-width: 1.4;
            stroke-linecap: round;
            opacity: 0.9;
            stroke-dasharray: 8 12;
            animation: planeArcDash linear infinite;
        }

        .plane-impact {
            animation: planeImpactPulse 1.6s ease-out forwards;
        }

        @keyframes planeArcDash {
            to { stroke-dashoffset: -180; }
        }

        @keyframes planeImpactPulse {
            0% { r: 1.2; opacity: 0.9; }
            70% { r: 6.5; opacity: 0.55; }
            100% { r: 10; opacity: 0; }
        }

        #globe-viz {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            overflow: hidden;
        }

        #globe-viz canvas {
            display: block !important;
            margin: 0 auto !important;
        }

        .metric-box {
            border: 1px solid rgba(255, 31, 45, 0.25);
            background: rgba(255, 31, 45, 0.08);
            border-radius: 14px;
            padding: 10px 14px;
        }

        .threat-item {
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding: 10px 12px;
        }

        .threat-item strong {
            color: #fff;
        }

        .chip {
            font-size: 11px;
            border: 1px solid rgba(255, 31, 45, 0.35);
            color: #ffd4d8;
            background: rgba(255, 31, 45, 0.13);
            border-radius: 9999px;
            padding: 3px 8px;
            letter-spacing: 0.02em;
        }

        @media (max-width: 1024px) {
            .threat-layout {
                grid-template-columns: 1fr;
            }
            #globe-wrap {
                height: 500px;
            }
        }

        .mode-btn {
            border: 1px solid rgba(255, 31, 45, 0.45);
            background: rgba(255, 31, 45, 0.12);
            color: #ffd4d8;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 11px;
            letter-spacing: 0.03em;
            transition: all 0.2s ease;
        }

        .mode-btn:hover {
            background: rgba(255, 31, 45, 0.2);
        }

        .mode-btn.is-active {
            background: rgba(255, 31, 45, 0.3);
            box-shadow: 0 0 18px rgba(255, 31, 45, 0.35);
        }
    </style>
</head>

<script>
    const menuBtn = document.getElementById('mobile-menu-btn');

            mobileMenu.classList.toggle('hidden');

<script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
<script>
    const threatTypes = ['DDoS', 'Ransomware', 'Botnet C2', 'Phishing Wave', 'Credential Stuffing', 'Malware Beacon'];
    const regions = ['CN', 'US', 'JP', 'DE', 'SG', 'AU', 'GB', 'BR', 'IN', 'ZA'];
    const listEl = document.getElementById('threat-list');
    const metricEvents = document.getElementById('metric-events');
    const metricCritical = document.getElementById('metric-critical');
    const metricBlocked = document.getElementById('metric-blocked');
    const globeViz = document.getElementById('globe-viz');
    const globeStage = document.getElementById('globe-stage');
    const globeWrap = document.getElementById('globe-wrap');
    const planeStage = document.getElementById('plane-stage');
    const planeSvg = document.getElementById('plane-svg');
    const planeLabels = document.getElementById('plane-labels');
    const btnGlobeView = document.getElementById('btn-globe-view');
    const btnPlaneView = document.getElementById('btn-plane-view');

    let totalEvents = 13280;
    let totalCritical = 428;
    let totalBlocked = 12744;
    const maxArcs = 80;
    const arcPalette = ['#ff2a35', '#ff4d57', '#ff7d86', '#ffd1d5'];
    const arcsData = [];
    const pointsData = [];
    let globeSize = 560;
    let currentView = 'globe';
    const countryLabels = [
        { name: 'USA', lat: 39.8, lng: -98.6 },
        { name: 'Canada', lat: 56.1, lng: -106.3 },
        { name: 'Brazil', lat: -10.3, lng: -53.2 },
        { name: 'UK', lat: 55.0, lng: -2.5 },
        { name: 'Germany', lat: 51.0, lng: 10.4 },
        { name: 'Russia', lat: 61.5, lng: 105.3 },
        { name: 'China', lat: 35.8, lng: 104.2 },
        { name: 'India', lat: 21.1, lng: 78.0 },
        { name: 'Japan', lat: 36.2, lng: 138.3 },
        { name: 'Australia', lat: -25.3, lng: 133.8 },
        { name: 'South Africa', lat: -30.6, lng: 22.9 },
        { name: 'Saudi Arabia', lat: 23.9, lng: 45.1 }
    ];

    function latLngToPlane(lat, lng) {
        const x = ((lng + 180) / 360) * 1000;
        const y = ((90 - lat) / 180) * 500;
        return { x, y };
    }

    function renderPlaneEffects() {
        if (currentView !== 'plane') return;
        const recentArcs = arcsData.slice(-18);
        const recentPoints = pointsData.slice(-20);
        let svgHtml = '';

        for (let i = 0; i < recentArcs.length; i++) {
            const arc = recentArcs[i];
            const start = latLngToPlane(arc.startLat, arc.startLng);
            const end = latLngToPlane(arc.endLat, arc.endLng);
            const ctrlX = (start.x + end.x) / 2;
            const curve = Math.max(20, Math.min(90, Math.abs(end.x - start.x) * 0.2 + 24));
            const ctrlY = Math.min(start.y, end.y) - curve;
            const dashDuration = Math.max(0.8, arc.dashTime / 1400);
            svgHtml += '<path class="plane-arc" d="M ' + start.x.toFixed(2) + ' ' + start.y.toFixed(2) +
                ' Q ' + ctrlX.toFixed(2) + ' ' + ctrlY.toFixed(2) + ' ' + end.x.toFixed(2) + ' ' + end.y.toFixed(2) + '"' +
                ' stroke="' + (Array.isArray(arc.color) ? arc.color[0] : arc.color) + '"' +
                ' style="animation-duration:' + dashDuration.toFixed(2) + 's"></path>';
        }

        for (let i = 0; i < recentPoints.length; i++) {
            const point = recentPoints[i];
            const pos = latLngToPlane(point.lat, point.lng);
            svgHtml += '<circle class="plane-impact" cx="' + pos.x.toFixed(2) + '" cy="' + pos.y.toFixed(2) +
                '" r="1.2" fill="' + point.color + '"></circle>';
        }

        planeSvg.innerHTML = svgHtml;
    }

    function renderCountryLabels() {
        let html = '';
        for (let i = 0; i < countryLabels.length; i++) {
            const country = countryLabels[i];
            const pos = latLngToPlane(country.lat, country.lng);
            const left = (pos.x / 1000) * 100;
            const top = (pos.y / 500) * 100;
            html += '<span class="country-label" style="left:' + left.toFixed(2) + '%;top:' + top.toFixed(2) + '%">' +
                country.name + '</span>';
        }
        planeLabels.innerHTML = html;
    }

    function setViewMode(mode) {
        currentView = mode;
        const isPlane = mode === 'plane';
        globeStage.style.display = isPlane ? 'none' : 'block';
        planeStage.style.display = isPlane ? 'block' : 'none';
        globe.controls().autoRotate = !isPlane;
        btnPlaneView.classList.toggle('is-active', isPlane);
        btnGlobeView.classList.toggle('is-active', !isPlane);
        if (isPlane) renderPlaneEffects();
    }

    function randomLatLng() {
        return {
            lat: (Math.random() * 180) - 90,
            lng: (Math.random() * 360) - 180
        };
    }

    function randomChoice(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    const globe = new Globe(globeViz)
        .globeImageUrl('//cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
        .backgroundColor('rgba(0,0,0,0)')
        .showAtmosphere(true)
        .atmosphereColor('#ff3f4e')
        .atmosphereAltitude(0.12)
        .arcColor('color')
        .arcAltitude('altitude')
        .arcStroke(0.6)
        .arcDashLength('dashLength')
        .arcDashGap('dashGap')
        .arcDashInitialGap(() => Math.random())
        .arcDashAnimateTime('dashTime')
        .arcsTransitionDuration(450)
        .pointAltitude('altitude')
        .pointRadius('radius')
        .pointColor('color');

    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.45;
    globe.controls().enablePan = false;
    globe.controls().minDistance = 160;
    globe.controls().maxDistance = 420;
    globe.controls().enableDamping = true;
    globe.controls().dampingFactor = 0.08;

    metricEvents.textContent = totalEvents.toLocaleString();
    metricCritical.textContent = totalCritical.toLocaleString();
    metricBlocked.textContent = totalBlocked.toLocaleString();

    function addThreatEffect() {
        const from = randomLatLng();
        const to = randomLatLng();
        const colorStart = randomChoice(arcPalette);
        const colorEnd = randomChoice(arcPalette);
        arcsData.push({
            startLat: from.lat,
            startLng: from.lng,
            endLat: to.lat,
            endLng: to.lng,
            color: [colorStart, colorEnd],
            altitude: 0.08 + Math.random() * 0.24,
            dashLength: 0.15 + Math.random() * 0.45,
            dashGap: 0.2 + Math.random() * 0.6,
            dashTime: 1300 + Math.random() * 2600
        });
        pointsData.push({
            lat: to.lat,
            lng: to.lng,
            radius: 0.16 + Math.random() * 0.09,
            altitude: 0.01,
            color: '#ffd1d5'
        });
        while (arcsData.length > maxArcs) arcsData.shift();
        while (pointsData.length > maxArcs) pointsData.shift();
        globe.arcsData(arcsData);
        globe.pointsData(pointsData);
        renderPlaneEffects();

        const item = document.createElement('div');
        item.className = 'threat-item';
        item.innerHTML = '<p class="text-xs text-gray-400 mb-1">' + new Date().toLocaleTimeString() + '</p>' +
            '<p class="text-sm"><strong>' + randomChoice(threatTypes) + '</strong> from ' + randomChoice(regions) + ' -> ' + randomChoice(regions) + '</p>';
        listEl.prepend(item);
        while (listEl.children.length > 12) listEl.removeChild(listEl.lastChild);

    }

    function resize() {
        const wrapStyles = window.getComputedStyle(globeWrap);
        const horizontalPadding = parseFloat(wrapStyles.paddingLeft) + parseFloat(wrapStyles.paddingRight);
        const verticalPadding = parseFloat(wrapStyles.paddingTop) + parseFloat(wrapStyles.paddingBottom);
        const availableWidth = Math.max(0, globeWrap.clientWidth - horizontalPadding);
        const availableHeight = Math.max(0, globeWrap.clientHeight - verticalPadding);
        const size = Math.max(280, Math.min(availableWidth, availableHeight));

        globeViz.style.width = size + 'px';
        globeViz.style.height = size + 'px';
        if (size !== globeSize) {
            globeSize = size;
            globe.width(globeSize).height(globeSize);
        }
        renderCountryLabels();
    }

    resize();
    window.addEventListener('resize', resize);
    btnPlaneView.addEventListener('click', () => setViewMode('plane'));
    btnGlobeView.addEventListener('click', () => setViewMode('globe'));

    function startExperience() {
        for (let i = 0; i < 36; i++) addThreatEffect();
    }

    startExperience();
</script>
