<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="icon-mask">
      <rect x="0" y="0" width="64" height="64" rx="12"/>
    </clipPath>
  </defs>
  <rect width="64" height="64" rx="12" fill="#050505"/>
  <!-- Fill square favicon area without distortion; crop sides if needed -->
  <g clip-path="url(#icon-mask)">
    <image
      href="/img/logimg/image.png"
      x="0"
      y="0"
      width="64"
      height="64"
      preserveAspectRatio="xMidYMid slice"
    />
  </g>
</svg>
