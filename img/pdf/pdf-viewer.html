<!DOCTYPE html>
<html>
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background-color: #1f1f1f;
        }

        .pdf-container {
            width: 100%;
            height: 100%;
            overflow: auto;
            scrollbar-width: thin;
            scrollbar-color: #ff3b3b #1f1f1f;
        }

        .pdf-container::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .pdf-container::-webkit-scrollbar-track {
            background: #1f1f1f;
        }

        .pdf-container::-webkit-scrollbar-thumb {
            background: #ff3b3b;
            border-radius: 2px;
        }

        .pdf-container::-webkit-scrollbar-thumb:hover {
            background: #ff4d4d;
        }

        object {
            display: block;
            width: 100%;
            min-height: 100%;
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <object data="(CML) Newsletter ENG - Feb 21 2026.pdf" type="application/pdf" width="100%" height="100%">
        </object>
    </div>
</body>
</html>
