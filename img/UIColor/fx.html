<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>黑色主题分层色卡</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{padding:30px;background:#f5f5f7}
        h2{margin-bottom:20px;color:#222}
        .item{display:flex;align-items:center;margin:10px 0;border-radius:12px;overflow:hidden}
        .color{width:120px;height:80px}
        .text{flex:1;padding:0 20px;background:#fff;height:80px;line-height:80px;font-size:16px}
    </style>
</head>
<body>
    <h2>⚫ 黑色主题分层色卡（板块区分专用）</h2>

    <div class="item">
        <div class="color" style="background:#0A0A0A"></div>
        <div class="text">全局背景 #0A0A0A（最底层）</div>
    </div>
    <div class="item">
        <div class="color" style="background:#121212"></div>
        <div class="text">导航栏 #121212</div>
    </div>
    <div class="item">
        <div class="color" style="background:#1A1A1A"></div>
        <div class="text">主内容区 #1A1A1A</div>
    </div>
    <div class="item">
        <div class="color" style="background:#242426"></div>
        <div class="text">卡片/列表 #242426</div>
    </div>
    <div class="item">
        <div class="color" style="background:#2C2C2E"></div>
        <div class="text">按钮/输入框 #2C2C2E</div>
    </div>
    <div class="item">
        <div class="color" style="background:#3A3A3C"></div>
        <div class="text">分割线/次要按钮 #3A3A3C</div>
    </div>
    <div class="item">
        <div class="color" style="background:#8E8E93"></div>
        <div class="text">辅助文字 #8E8E93</div>
    </div>
    <div class="item">
        <div class="color" style="background:#E5E5E7"></div>
        <div class="text">正文文字 #E5E5E7</div>
    </div>
    <div class="item">
        <div class="color" style="background:#F9F9FB"></div>
        <div class="text">标题/高亮 #F9F9FB</div>
    </div>
</body>
</html>
