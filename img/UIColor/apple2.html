<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Apple 官方色系</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{padding:30px;background:#fff}
        h2{margin-bottom:20px;color:#1D1D1F}
        .color-group{margin-bottom:30px}
        .color-box{display:inline-block;width:140px;height:140px;margin:8px;border-radius:12px;text-align:center;line-height:140px;color:#fff;font-weight:bold}
        .dark-text{color:#1D1D1F}
    </style>
</head>
<body>
    <h2>🍎 Apple 品牌主色</h2>
    <div class="color-group">
        <div class="color-box" style="background:#0071E3">#0071E3</div>
        <div class="color-box" style="background:#34C759">#34C759</div>
        <div class="color-box" style="background:#FF9500">#FF9500</div>
        <div class="color-box" style="background:#FF3B30">#FF3B30</div>
        <div class="color-box" style="background:#AF52DE">#AF52DE</div>
        <div class="color-box" style="background:#5856D6">#5856D6</div>
    </div>

    <h2>🌙 Apple 深色模式灰阶</h2>
    <div class="color-group">
        <div class="color-box dark-text" style="background:#121212">#121212</div>
        <div class="color-box dark-text" style="background:#1C1C1E">#1C1C1E</div>
        <div class="color-box dark-text" style="background:#2C2C2E">#2C2C2E</div>
        <div class="color-box dark-text" style="background:#3A3A3C">#3A3A3C</div>
        <div class="color-box" style="background:#8E8E93">#8E8E93</div>
        <div class="color-box" style="background:#EBEBF5;color:#000">#EBEBF5</div>
        <div class="color-box" style="background:#F5F5F7;color:#000">#F5F5F7</div>
    </div>
</body>
</html>
