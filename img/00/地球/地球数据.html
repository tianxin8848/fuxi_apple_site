<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raised xxxFlat World Map 平面凸起地图</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #d8d8d8;
        }

        #globeViz {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #f2f2f2 0%, #b9b9b9 52%, #111111 100%);
        }

        .debug-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            font-family: Consolas, Monaco, monospace;
            font-size: 12px;
            padding: 12px;
            border-radius: 5px;
            z-index: 9999;
            min-width: 240px;
            line-height: 1.55;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.25);
        }

        .control-panel {
            position: fixed;
            right: 10px;
            top: 10px;
            width: 300px;
            background: rgba(0, 0, 0, 0.72);
            color: #e8f7ff;
            font-family: Consolas, Monaco, "Microsoft YaHei", sans-serif;
            font-size: 13px;
            padding: 12px;
            border-radius: 6px;
            z-index: 9999;
            border: 1px solid rgba(0, 170, 255, 0.35);
            box-shadow: 0 0 12px rgba(0, 170, 255, 0.25);
            line-height: 1.6;
        }

        .control-panel label {
            display: block;
            margin-bottom: 6px;
            color: #9bdcff;
        }

        .control-panel input[type="range"] {
            width: 100%;
        }

        .country-html-label {
            color: #ffdede;
            font-size: 12px;
            font-weight: 700;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            text-shadow: 0 0 6px rgba(255, 40, 40, 0.9), 0 0 12px rgba(255, 40, 40, 0.55);
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        .country-html-label.blue {
            color: #8ee8ff;
            text-shadow: 0 0 6px rgba(0, 170, 255, 0.95), 0 0 12px rgba(0, 170, 255, 0.65);
        }
        .mode-title {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdede;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 42, 42, 0.8);
            z-index: 9999;
            pointer-events: none;
        }

        .view-toggle-btn {
            position: fixed;
            left: 50%;
            top: 48px;
            transform: translateX(-50%);
            z-index: 9999;
            border: 1px solid rgba(255, 0, 0, 0.72);
            background: rgba(0, 0, 0, 0.76);
            color: #ff2b2b;
            font-family: Consolas, Monaco, "Microsoft YaHei", sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            padding: 8px 14px;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(255, 0, 0, 0.45);
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .view-toggle-btn:hover {
            color: #ffffff;
            border-color: rgba(255, 0, 0, 1);
            box-shadow: 0 0 22px rgba(255, 0, 0, 0.72);
        }

        .map_control_button {
            width: 20px;
            height: 20px;
            display: block;
            flex: 0 0 auto;
        }

        .map_control_button_label_right {
            white-space: nowrap;
            line-height: 1;
        }

        #transitionMask {
            position: fixed;
            inset: 0;
            background: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 9998;
        }
    </style>
</head>

    <script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
    <script src="https://unpkg.com/earcut@2.2.4/dist/earcut.min.js"></script>
    <script>

        const outlineSlider = document.getElementById('outlineSlider');

        const tubeSlider = document.getElementById('tubeSlider');

        const pointASizeSlider = document.getElementById('pointASizeSlider');

        const pointAGlowSlider = document.getElementById('pointAGlowSlider');
        const pointAGlowValue = document.getElementById('pointAGlowValue');
        const pointAGlowOffsetSlider = document.getElementById('pointAGlowOffsetSlider');

        let labelGroup = null;

        let pointAGroup = null;

        const beamRibbons = [];

        const beamTailMeshes = [];
        const EMITTER_FADE_SECONDS = 1.0;
        let isDragging = false;
        let lastPointerX = 0;
        let lastPointerY = 0;
        let panX = 0;
        let panY = 0;
        let targetPanX = 0;
        let targetPanY = 0;
        let zoom = 1;
        let targetZoom = 1;
        let savedFlatPanX = 0;
        let savedFlatPanY = 0;
        let savedFlatTargetPanX = 0;
        let savedFlatTargetPanY = 0;
        let savedFlatZoom = 1;
        let savedFlatTargetZoom = 1;
        let flatTilt = 0;
        let targetFlatTilt = 0;
        let savedFlatTilt = 0;
        let savedFlatTargetTilt = 0;

        let targetMorph = 0;

        let morphEnd = 0;
        let morphStartTime = 0;
        let transitionMaskUntil = 0;
        const TRANSITION_MASK_DURATION_MS = 380;
        const MORPH_DURATION_MS = 450;
        const morphTargets = [];
        const labelSprites = [];
        let sphereRotationY = 0;
        let sphereRotationX = -0.22;
        const pointAWorldPos = new THREE.Vector3();
        const sphereCenterWorldPos = new THREE.Vector3();
        const pointANormal = new THREE.Vector3();
        const pointAToCamera = new THREE.Vector3();
        const BEAM_TMP_VEC_A = new THREE.Vector3();
        const BEAM_TMP_VEC_B = new THREE.Vector3();
        const BEAM_TMP_VEC_C = new THREE.Vector3();
        const BEAM_TMP_VEC_D = new THREE.Vector3();
        let effectDepthOcclusionEnabled = false;
        const hemisphereWorldPos = new THREE.Vector3();
        const hemisphereCenter = new THREE.Vector3();
        const hemisphereNormal = new THREE.Vector3();
        const hemisphereToCamera = new THREE.Vector3();
        const beamStartPos = new THREE.Vector3();
        const beamEndPos = new THREE.Vector3();
        const beamCurrentPos = new THREE.Vector3();
        const beamDir = new THREE.Vector3();
        const beamMid = new THREE.Vector3();
        const beamWorldSamplePos = new THREE.Vector3();
        const beamWorldSampleCenter = new THREE.Vector3();
        const beamWorldSampleNormal = new THREE.Vector3();
        const beamWorldSampleToCamera = new THREE.Vector3();
        const Y_AXIS = new THREE.Vector3(0, 1, 0);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd8d8d8);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 0, 620);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.sortObjects = true;
        globeContainer.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.85);
        scene.add(ambient);

        const sideLight = new THREE.DirectionalLight(0xffffff, 0.55);
        sideLight.position.set(-300, 260, 500);
        scene.add(sideLight);

        const MAP_WIDTH = 900;
        const MAP_HEIGHT = 450;
        const BASE_Z = 0;
        const RAISED_Z = 8;
        const MIN_ZOOM = 0.75;
        const MAX_ZOOM = 3.2;
        const FLAT_MIN_TILT = 0;
        const FLAT_MAX_TILT = -0.82;
        const FLAT_TILT_STEP = 0.08;
        const FLAT_ZOOM_STEP = 0.035;
        const FLAT_MIN_ZOOM = 1;
        const FLAT_MAX_ZOOM = 1.22;
        const FLAT_FIXED_CAMERA_Z = 620;
        const SPHERE_EFFECT_SURFACE_OFFSET = 0.18;
        const SPHERE_EFFECT_WAVE_OFFSET = 0.22;
        // 球体模式下：彗星从第二层外表发射，并保持最小离地净空，避免穿入凸起陆地。
        const BEAM_SPHERE_SURFACE_EMIT_OFFSET = 2.6;
        const BEAM_SPHERE_SURFACE_CLEARANCE = 1.1;
        const POINT_A = {
            name: 'A',
            lon: 104.19,
            lat: 35.86,
            // A 点不是悬浮点，而是贴着第二层陆地面片。
            // 这里只保留很小的表面偏移，避免和陆地面片 z-fighting。
            surfaceOffset: 1.2
        };
        const POINT_B = {
            name: 'B',
            lon: 121.47,
            lat: 31.23,
            surfaceOffset: 1.2
        };
        const POINT_C = {
            name: 'C',
            lon: -77.0369,
            lat: 38.9072,
            surfaceOffset: 1.2
        };
        const DETECTION_TYPES = {
            OAS: '#38b349',
            ODS: '#ed1c24',
            MAV: '#f26522',
            WAV: '#0087f4',
            IDS: '#ec008c',
            VUL: '#fbf267',
            KAS: '#855ff4',
            RMW: '#0000ff'
        };
        const SAMPLE_COUNTRY_POINTS = [
            { key: 'CN', name: 'China', lon: 104.19, lat: 35.86, type: 'ODS' },
            { key: 'US', name: 'United States', lon: -95.71, lat: 37.09, type: 'WAV' },
            { key: 'RU', name: 'Russia', lon: 105.31, lat: 61.52, type: 'ODS' },
            { key: 'JP', name: 'Japan', lon: 138.25, lat: 36.2, type: 'WAV' },
            { key: 'DE', name: 'Germany', lon: 10.45, lat: 51.17, type: 'ODS' },
            { key: 'BR', name: 'Brazil', lon: -51.93, lat: -14.24, type: 'WAV' },
            { key: 'IN', name: 'India', lon: 78.96, lat: 20.59, type: 'ODS' },
            { key: 'AU', name: 'Australia', lon: 133.78, lat: -25.27, type: 'WAV' }
        ];
        const SAMPLE_BEAM_LINKS = [
            { from: 'CN', to: 'US', type: 'ODS', phase: 0.02 },
            { from: 'US', to: 'JP', type: 'WAV', phase: 0.16 },
            { from: 'RU', to: 'DE', type: 'ODS', phase: 0.28 },
            { from: 'JP', to: 'AU', type: 'WAV', phase: 0.42 },
            { from: 'DE', to: 'IN', type: 'ODS', phase: 0.58 },
            { from: 'BR', to: 'US', type: 'WAV', phase: 0.72 },
            { from: 'IN', to: 'CN', type: 'ODS', phase: 0.84 },
            { from: 'AU', to: 'BR', type: 'WAV', phase: 0.93 }
        ];
        const SPHERE_RADIUS = 130;
        // 参考稿的固定弧面构图参数（按当前半径比例换算）
        const SPHERE_FIXED_Y = -0.78 * SPHERE_RADIUS;
        const SPHERE_LOOK_AT_Y_OFFSET = 0.58 * SPHERE_RADIUS;
        const SPHERE_MIN_CAMERA_Z = 1.18 * SPHERE_RADIUS;
        const SPHERE_MAX_CAMERA_Z = 4.8 * SPHERE_RADIUS;
        const SPHERE_WHEEL_STEP = 0.12 * SPHERE_RADIUS;
        let sphereCameraZ = 1.42 * SPHERE_RADIUS;
        let sphereTargetCameraZ = 1.42 * SPHERE_RADIUS;
        const sphereDragSensitivity = new THREE.Vector2(0.00022, 0.00016);
        const sphereRotationTarget = new THREE.Vector2(0, 0);
        const sphereRotationVelocity = new THREE.Vector2(0, 0);
        const sphereRotationLerp = 0.16;
        const sphereRotationDamping = 0.92;

        function showBootError(message, error) {
            console.error(message, error || '');
            const panel = document.createElement('div');
            panel.style.position = 'fixed';
            panel.style.right = '10px';
            panel.style.bottom = '10px';
            panel.style.maxWidth = '520px';
            panel.style.padding = '12px 14px';
            panel.style.background = 'rgba(120, 0, 0, 0.88)';
            panel.style.border = '1px solid rgba(255, 80, 80, 0.9)';
            panel.style.color = '#ffd6d6';
            panel.style.font = '12px/1.6 Consolas, Monaco, monospace';
            panel.style.zIndex = '10000';
            panel.textContent = `${message}: ${error && error.message ? error.message : String(error || '')}`;
            document.body.appendChild(panel);
        }

        if (!window.THREE) {
            showBootError('Three.js 没有加载成功，请检查 CDN 或网络访问', new Error('window.THREE is missing'));
        }

        function normalizeLon(lon) {
            return ((((lon + 180) % 360) + 360) % 360) - 180;
        }

        function lonLatToPlane(lon, lat, z = 0) {
            const safeLon = THREE.MathUtils.clamp(Number(lon), -180, 180);
            const safeLat = THREE.MathUtils.clamp(Number(lat), -85, 85);
            return new THREE.Vector3(
                (safeLon / 180) * (MAP_WIDTH / 2),
                (safeLat / 85) * (MAP_HEIGHT / 2),
                z
            );
        }

        function lonLatToSphere(lon, lat, altitude = 0) {
            const safeLon = THREE.MathUtils.clamp(Number(lon), -180, 180);
            const safeLat = THREE.MathUtils.clamp(Number(lat), -85, 85);
            const radius = SPHERE_RADIUS + altitude;
            const phi = THREE.MathUtils.degToRad(90 - safeLat);
            const theta = THREE.MathUtils.degToRad(safeLon + 180);
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function getMorphedPointPosition(lon, lat, flatAltitude, sphereAltitude) {
            const flat = lonLatToPlane(lon, lat, flatAltitude);
            const sphere = lonLatToSphere(lon, lat, sphereAltitude);
            return flat.clone().lerp(sphere, morphProgress);
        }

        function registerMorphTarget(object) {
            if (!object) return object;
            if (object.morphTargetInfluences && object.morphTargetInfluences.length > 0) {
                object.morphTargetInfluences[0] = morphProgress;
                morphTargets.push(object);
            }
            return object;
        }

        function applyMorphProgress() {
            morphTargets.forEach((object) => {
                if (object.morphTargetInfluences && object.morphTargetInfluences.length > 0) {
                    object.morphTargetInfluences[0] = morphProgress;
                }
            });

            sampleEmitters.forEach((emitter) => {
                const group = emitter.group;
                if (!group) return;
                const flat = group.userData.flatPosition;
                const sphere = group.userData.spherePosition;
                if (flat && sphere) {
                    group.position.copy(flat.clone().lerp(sphere, morphProgress));
                }
                const flatQ = group.userData.flatQuaternion;
                const sphereQ = group.userData.sphereQuaternion;
                if (flatQ && sphereQ) {
                    group.quaternion.copy(flatQ).slerp(sphereQ, morphProgress);
                }
            });

            labelSprites.forEach((sprite) => {
                const flat = sprite.userData.flatPosition;
                const sphere = sprite.userData.spherePosition;
                if (!flat || !sphere) return;
                sprite.position.copy(flat.clone().lerp(sphere, morphProgress));
            });

            if (pointAGroup) {
                const flat = pointAGroup.userData.flatPosition;
                const sphere = pointAGroup.userData.spherePosition;
                if (flat && sphere) {
                    pointAGroup.position.copy(flat.clone().lerp(sphere, morphProgress));
                }
                const flatQ = pointAGroup.userData.flatQuaternion;
                const sphereQ = pointAGroup.userData.sphereQuaternion;
                if (flatQ && sphereQ) {
                    pointAGroup.quaternion.copy(flatQ).slerp(sphereQ, morphProgress);
                }
            }

            if (pointBGroup) {
                const flat = pointBGroup.userData.flatPosition;
                const sphere = pointBGroup.userData.spherePosition;
                if (flat && sphere) {
                    pointBGroup.position.copy(flat.clone().lerp(sphere, morphProgress));
                }
            }

            if (pointCGroup) {
                const flat = pointCGroup.userData.flatPosition;
                const sphere = pointCGroup.userData.spherePosition;
                if (flat && sphere) {
                    pointCGroup.position.copy(flat.clone().lerp(sphere, morphProgress));
                }
                const flatQ = pointCGroup.userData.flatQuaternion;
                const sphereQ = pointCGroup.userData.sphereQuaternion;
                if (flatQ && sphereQ) {
                    pointCGroup.quaternion.copy(flatQ).slerp(sphereQ, morphProgress);
                }
            }

            if (oceanSphereMesh && oceanSphereMesh.material) {
                // 球体外壳保持不透明，作为遮挡层，避免看到另一面。
                oceanSphereMesh.visible = morphProgress > 0.01;
            }
        }

        function ringHasHugeLongitudeJump(ring) {
            if (!Array.isArray(ring) || ring.length < 2) return false;
            for (let i = 1; i < ring.length; i += 1) {
                const prev = ring[i - 1];
                const curr = ring[i];
                if (!prev || !curr || prev.length < 2 || curr.length < 2) continue;
                const lonDelta = Math.abs(normalizeLon(Number(curr[0]) - Number(prev[0])));
                if (lonDelta > 120) return true;
            }
            return false;
        }

        function cleanRing(ring) {
            if (!Array.isArray(ring)) return [];
            const clean = [];
            ring.forEach((coord) => {
                if (!coord || coord.length < 2) return;
                const lon = Number(coord[0]);
                const lat = Number(coord[1]);
                if (!Number.isFinite(lon) || !Number.isFinite(lat)) return;
                if (Math.abs(lat) > 85) return;
                clean.push([lon, lat]);
            });
            if (clean.length > 2) {
                const first = clean[0];
                const last = clean[clean.length - 1];
                if (Math.abs(first[0] - last[0]) < 1e-8 && Math.abs(first[1] - last[1]) < 1e-8) {
                    clean.pop();
                }
            }
            return clean;
        }

        function makePolygonMesh(rings, z, material, renderOrder) {
            if (!window.earcut || !rings || !rings.length) return null;
            if (ringHasHugeLongitudeJump(rings[0])) return null;

            const flat = [];
            const holes = [];
            const points = [];

            rings.forEach((ring, ringIndex) => {
                const clean = cleanRing(ring);
                if (clean.length < 3) return;
                if (ringIndex > 0) holes.push(flat.length / 2);
                clean.forEach(([lon, lat]) => {
                    flat.push(lon, lat);
                    points.push({ lon, lat });
                });
            });

            if (points.length < 3) return null;

            const indices = window.earcut(flat, holes, 2);
            if (!indices.length) return null;

            const flatPositions = [];
            const spherePositions = [];
            indices.forEach((index) => {
                const p = points[index];
                const flat = lonLatToPlane(p.lon, p.lat, z);
                const sphere = lonLatToSphere(p.lon, p.lat, z);
                flatPositions.push(flat.x, flat.y, flat.z);
                spherePositions.push(sphere.x, sphere.y, sphere.z);
            });

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(flatPositions, 3));
            geometry.morphAttributes.position = [new THREE.Float32BufferAttribute(spherePositions, 3)];
            geometry.computeVertexNormals();

            const mesh = new THREE.Mesh(geometry, material);
            mesh.renderOrder = renderOrder;
            return registerMorphTarget(mesh);
        }

        function makeSideWall(ring, bottomZ, topZ, material) {
            const clean = cleanRing(ring);
            if (clean.length < 3 || ringHasHugeLongitudeJump(clean)) return null;

            const flatPositions = [];
            const spherePositions = [];
            const indices = [];

            clean.forEach(([lon, lat]) => {
                const flatTop = lonLatToPlane(lon, lat, topZ);
                const flatBottom = lonLatToPlane(lon, lat, bottomZ);
                const sphereTop = lonLatToSphere(lon, lat, topZ);
                const sphereBottom = lonLatToSphere(lon, lat, bottomZ);
                flatPositions.push(flatTop.x, flatTop.y, flatTop.z);
                flatPositions.push(flatBottom.x, flatBottom.y, flatBottom.z);
                spherePositions.push(sphereTop.x, sphereTop.y, sphereTop.z);
                spherePositions.push(sphereBottom.x, sphereBottom.y, sphereBottom.z);
            });

            for (let i = 0; i < clean.length; i += 1) {
                const next = (i + 1) % clean.length;
                const lonDelta = Math.abs(normalizeLon(clean[next][0] - clean[i][0]));
                if (lonDelta > 120) continue;
                const topA = i * 2;
                const bottomA = i * 2 + 1;
                const topB = next * 2;
                const bottomB = next * 2 + 1;
                indices.push(topA, bottomA, topB);
                indices.push(topB, bottomA, bottomB);
            }

            if (!indices.length) return null;

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(flatPositions, 3));
            geometry.morphAttributes.position = [new THREE.Float32BufferAttribute(spherePositions, 3)];
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            const mesh = new THREE.Mesh(geometry, material);
            mesh.renderOrder = 90;
            return registerMorphTarget(mesh);
        }

        // 红色轮廓必须直接复用 GeoJSON 原始 ring 的直线边，不能用 CatmullRomCurve3 平滑，否则会和 earcut 填充边缘不重合。
        function makeOutlineTube(ring, z, radius, color, opacity = 1) {
            const clean = cleanRing(ring);
            if (clean.length < 2) return [];

            const flatPositions = [];
            const spherePositions = [];
            const indices = [];
            const halfWidth = Math.max(radius, 0.05);

            function addSegment(a, b) {
                const lonDelta = Math.abs(normalizeLon(b[0] - a[0]));
                if (lonDelta > 120) return;

                const flatA = lonLatToPlane(a[0], a[1], z);
                const flatB = lonLatToPlane(b[0], b[1], z);
                const flatDir = new THREE.Vector3().subVectors(flatB, flatA);
                if (flatDir.lengthSq() < 0.000001) return;
                flatDir.normalize();
                const flatSide = new THREE.Vector3(-flatDir.y, flatDir.x, 0).multiplyScalar(halfWidth);

                const sphereA = lonLatToSphere(a[0], a[1], z);
                const sphereB = lonLatToSphere(b[0], b[1], z);
                const sphereDir = new THREE.Vector3().subVectors(sphereB, sphereA);
                if (sphereDir.lengthSq() < 0.000001) return;
                sphereDir.normalize();
                const sphereNormalA = sphereA.clone().normalize();
                const sphereNormalB = sphereB.clone().normalize();
                const sphereSideA = new THREE.Vector3().crossVectors(sphereNormalA, sphereDir).normalize().multiplyScalar(halfWidth);
                const sphereSideB = new THREE.Vector3().crossVectors(sphereNormalB, sphereDir).normalize().multiplyScalar(halfWidth);

                const baseIndex = flatPositions.length / 3;

                const flatVertices = [
                    flatA.clone().add(flatSide),
                    flatA.clone().sub(flatSide),
                    flatB.clone().add(flatSide),
                    flatB.clone().sub(flatSide)
                ];

                const sphereVertices = [
                    sphereA.clone().add(sphereSideA),
                    sphereA.clone().sub(sphereSideA),
                    sphereB.clone().add(sphereSideB),
                    sphereB.clone().sub(sphereSideB)
                ];

                flatVertices.forEach((v) => flatPositions.push(v.x, v.y, v.z));
                sphereVertices.forEach((v) => spherePositions.push(v.x, v.y, v.z));

                indices.push(baseIndex, baseIndex + 1, baseIndex + 2);
                indices.push(baseIndex + 2, baseIndex + 1, baseIndex + 3);
            }

            for (let i = 0; i < clean.length; i += 1) {
                const a = clean[i];
                const b = clean[(i + 1) % clean.length];
                addSegment(a, b);
            }

            if (!indices.length) return [];

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(flatPositions, 3));
            geometry.morphAttributes.position = [new THREE.Float32BufferAttribute(spherePositions, 3)];
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            const material = new THREE.MeshBasicMaterial({
                color,
                transparent: opacity < 1,
                opacity,
                side: THREE.DoubleSide,
                depthTest: true,
                depthWrite: false
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.renderOrder = 160;
            return [registerMorphTarget(mesh)];
        }

        function disposeGroup(group) {
            if (!group) return;
            group.traverse((child) => {
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
            });
            if (group.parent) group.parent.remove(group);
            oceanSphereMesh = null;
            pointAGroup = null;
            pointBGroup = null;
            pointCGroup = null;
            samplePointGroup = null;
            beamGroup = null;
            sampleEmitters.length = 0;
            beamRibbons.length = 0;
            beamTailMeshes.length = 0;
        }

        function buildFlatMap() {
            disposeGroup(mapGroup);
            morphTargets.length = 0;
            labelSprites.length = 0;
            oceanSphereMesh = null;
            pointAGroup = null;
            pointBGroup = null;
            pointCGroup = null;
            samplePointGroup = null;
            beamGroup = null;
            sampleEmitters.length = 0;
            beamRibbons.length = 0;
            beamTailMeshes.length = 0;

            mapGroup = new THREE.Group();
            baseLandGroup = new THREE.Group();
            raisedLandGroup = new THREE.Group();
            outlineGroup = new THREE.Group();
            labelGroup = new THREE.Group();

            // 不再创建平面 oceanPlane。
            // 原因：oceanPlane 不参与 Morph Target，平面切换到球体时会残留在球体中间形成一条横线并遮挡内容。
            // 平面背景直接使用 CSS/scene.background；球体底壳用透明度随 morphProgress 渐入。
            oceanSphereMesh = new THREE.Mesh(
                new THREE.SphereGeometry(SPHERE_RADIUS - 1.5, 96, 48),
                new THREE.MeshBasicMaterial({
                    color: 0x061a1a,
                    transparent: false,
                    opacity: 1,
                    side: THREE.FrontSide,
                    depthWrite: true,
                    depthTest: true
                })
            );
            oceanSphereMesh.visible = morphProgress > 0.01;
            oceanSphereMesh.renderOrder = 0;
            mapGroup.add(oceanSphereMesh);

            const baseMaterial = new THREE.MeshBasicMaterial({
                color: targetMorph === 1 ? 0x101416 : 0x111111,
                transparent: false,
                side: THREE.FrontSide,
                depthTest: true,
                depthWrite: true
            });

            const raisedMaterial = new THREE.MeshBasicMaterial({
                color: targetMorph === 1 ? 0x272d31 : 0x3a3a3a,
                transparent: false,
                side: THREE.FrontSide,
                depthTest: true,
                depthWrite: true
            });

            const sideMaterial = new THREE.MeshBasicMaterial({
                color: targetMorph === 1 ? 0x14191c : 0x202020,
                transparent: false,
                side: THREE.FrontSide,
                depthTest: true,
                depthWrite: true
            });


            countriesData.forEach((feature) => {
                const geometry = feature.geometry;
                if (!geometry) return;

                const polygons = geometry.type === 'Polygon'
                    ? [geometry.coordinates]
                    : geometry.type === 'MultiPolygon'
                        ? geometry.coordinates
                        : [];

                polygons.forEach((polygon) => {
                    const baseMesh = makePolygonMesh(polygon, BASE_Z, baseMaterial, 20);
                    if (baseMesh) baseLandGroup.add(baseMesh);

                    const raisedMesh = makePolygonMesh(polygon, landHeight, raisedMaterial, 110);
                    if (raisedMesh) raisedLandGroup.add(raisedMesh);

                    const sideWall = makeSideWall(polygon[0], BASE_Z, landHeight, sideMaterial);
                    if (sideWall) raisedLandGroup.add(sideWall);

                    const shadowRadius = outlineWidth * 0.28;
                    const redRadius = outlineWidth * 0.14;
                    makeOutlineTube(polygon[0], landHeight + 0.18, shadowRadius, 0xff0000, 0.35).forEach((mesh) => outlineGroup.add(mesh));
                    makeOutlineTube(polygon[0], landHeight + 0.35, redRadius, 0xff0000, 1).forEach((mesh) => outlineGroup.add(mesh));
                });
            });

            addGridLines();
            addPointA();
            addPointB();
            addPointC();
            addSampleEmitterPoints();
            addBeamEffect();
            addCountryLabels();

            mapGroup.add(baseLandGroup);
            mapGroup.add(raisedLandGroup);
            mapGroup.add(outlineGroup);
            mapGroup.add(labelGroup);
            if (targetMorph === 1) {
                mapGroup.rotation.x = sphereRotationX;
                mapGroup.rotation.y = sphereRotationY;
                mapGroup.position.set(0, SPHERE_FIXED_Y, 0);
                mapGroup.scale.set(1, 1, 1);
                camera.position.set(0, 0, sphereCameraZ);
                camera.lookAt(0, SPHERE_FIXED_Y + SPHERE_LOOK_AT_Y_OFFSET, 0);
            } else {
                mapGroup.position.set(panX, panY, 0);
                mapGroup.scale.set(zoom, zoom, zoom);
                mapGroup.rotation.x = flatTilt;
                mapGroup.rotation.y = 0;
                camera.position.set(0, 0, FLAT_FIXED_CAMERA_Z);
                camera.lookAt(0, 0, 0);
            }
            scene.add(mapGroup);
        }

        function addGridLines() {
            const gridMaterial = new THREE.LineBasicMaterial({
                color: 0x00ff66,

            });

            const gridGroup = new THREE.Group();
            gridGroup.renderOrder = 5;

            function makeMorphLine(coords) {
                const flatPositions = [];
                const spherePositions = [];
                coords.forEach(([lon, lat]) => {
                    const flat = lonLatToPlane(lon, lat, -0.8);
                    const sphere = lonLatToSphere(lon, lat, 0.8);
                    flatPositions.push(flat.x, flat.y, flat.z);
                    spherePositions.push(sphere.x, sphere.y, sphere.z);
                });
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(flatPositions, 3));
                geometry.morphAttributes.position = [new THREE.Float32BufferAttribute(spherePositions, 3)];
                const line = new THREE.Line(geometry, gridMaterial);
                return registerMorphTarget(line);
            }

            for (let lon = -180; lon <= 180; lon += 15) {
                const coords = [];
                for (let lat = -85; lat <= 85; lat += 2) coords.push([lon, lat]);
                gridGroup.add(makeMorphLine(coords));
            }

            for (let lat = -75; lat <= 75; lat += 15) {
                const coords = [];
                for (let lon = -180; lon <= 180; lon += 2) coords.push([lon, lat]);
                gridGroup.add(makeMorphLine(coords));
            }

            mapGroup.add(gridGroup);
        }

        function createBeamRibbonGeometry(segments = 96) {
            const vertexCount = (segments + 1) * 2;
            const positions = new Float32Array(vertexCount * 3);
            const uvs = new Float32Array(vertexCount * 2);
            const beamAlphas = new Float32Array(vertexCount);
            const indices = [];

            for (let i = 0; i <= segments; i += 1) {
                const t = i / segments;
                const li = i * 2;
                const ri = li + 1;
                uvs[li * 2] = t;
                uvs[li * 2 + 1] = 0;
                uvs[ri * 2] = t;
                uvs[ri * 2 + 1] = 1;
                beamAlphas[li] = 1;
                beamAlphas[ri] = 1;

                if (i < segments) {
                    const nli = (i + 1) * 2;
                    const nri = nli + 1;
                    indices.push(li, ri, nli);
                    indices.push(ri, nri, nli);
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
            geometry.setAttribute('beamAlpha', new THREE.BufferAttribute(beamAlphas, 1));
            geometry.setIndex(indices);
            geometry.computeBoundingSphere();
            return geometry;
        }

        function updateBeamRibbonGeometry(geometry, start, end, widthScale, arcHeight, segments = 96) {
            if (!geometry || !geometry.attributes || !geometry.attributes.position) return;
            const positions = geometry.attributes.position.array;
            const beamAlphas = geometry.attributes.beamAlpha
                ? geometry.attributes.beamAlpha.array
                : null;
            const up = BEAM_TMP_VEC_A.set(0, 0, 1);
            const fallback = BEAM_TMP_VEC_B.set(1, 0, 0);
            const startNormal = BEAM_TMP_VEC_C.copy(start).normalize();
            const endNormal = BEAM_TMP_VEC_D.copy(end).normalize();
            const useSphereShape = morphProgress > 0.35 && start.lengthSq() > 1 && end.lengthSq() > 1;
            const control = start.clone().add(end).multiplyScalar(0.5);
            if (useSphereShape) {
                const midNormal = startNormal.clone().add(endNormal).normalize();
                control.addScaledVector(midNormal, arcHeight);
                if (mapGroup) mapGroup.updateMatrixWorld(true);
            } else {
                control.z += arcHeight;
            }
            const curve = new THREE.QuadraticBezierCurve3(start.clone(), control, end.clone());

            for (let i = 0; i <= segments; i += 1) {
                const t = i / segments;
                const p = curve.getPoint(t);
                if (useSphereShape) {
                    const minSurfaceRadius = SPHERE_RADIUS + landHeight + BEAM_SPHERE_SURFACE_CLEARANCE;
                    const pLen = p.length();
                    if (pLen > 1e-6 && pLen < minSurfaceRadius) {
                        p.multiplyScalar(minSurfaceRadius / pLen);
                    }
                }
                const tangent = curve.getTangent(t).normalize();
                let side = new THREE.Vector3().crossVectors(useSphereShape ? p.clone().normalize() : up, tangent).normalize();
                if (side.lengthSq() < 1e-6) {
                    side = new THREE.Vector3().crossVectors(fallback, tangent).normalize();
                }

                const widthProfile = Math.sin(Math.PI * t);
                let sampleAlpha = 1;
                let halfWidth = Math.max(0.015, widthScale * 8.0 * widthProfile);
                if (useSphereShape && mapGroup) {
                    beamWorldSamplePos.copy(p);
                    mapGroup.localToWorld(beamWorldSamplePos);
                    mapGroup.getWorldPosition(beamWorldSampleCenter);
                    beamWorldSampleNormal.copy(beamWorldSamplePos).sub(beamWorldSampleCenter).normalize();
                    beamWorldSampleToCamera.copy(camera.position).sub(beamWorldSamplePos).normalize();
                    const facing = beamWorldSampleNormal.dot(beamWorldSampleToCamera);
                    sampleAlpha = THREE.MathUtils.smoothstep(facing, -0.02, 0.08);
                    halfWidth *= sampleAlpha;
                }
                const left = p.clone().addScaledVector(side, halfWidth);
                const right = p.clone().addScaledVector(side, -halfWidth);
                if (useSphereShape) {
                    const minSurfaceRadius = SPHERE_RADIUS + landHeight + BEAM_SPHERE_SURFACE_CLEARANCE;
                    const leftLen = left.length();
                    const rightLen = right.length();
                    if (leftLen > 1e-6 && leftLen < minSurfaceRadius) {
                        left.multiplyScalar(minSurfaceRadius / leftLen);
                    }
                    if (rightLen > 1e-6 && rightLen < minSurfaceRadius) {
                        right.multiplyScalar(minSurfaceRadius / rightLen);
                    }
                }

                const li = i * 2;
                const ri = li + 1;
                positions[li * 3] = left.x;
                positions[li * 3 + 1] = left.y;
                positions[li * 3 + 2] = left.z;
                positions[ri * 3] = right.x;
                positions[ri * 3 + 1] = right.y;
                positions[ri * 3 + 2] = right.z;
                if (beamAlphas) {
                    beamAlphas[li] = sampleAlpha;
                    beamAlphas[ri] = sampleAlpha;
                }
            }

            geometry.attributes.position.needsUpdate = true;
            if (geometry.attributes.beamAlpha) {
                geometry.attributes.beamAlpha.needsUpdate = true;
            }
            geometry.computeBoundingSphere();
        }

        function addBeamEffect() {
            beamGroup = new THREE.Group();
            beamGroup.name = 'flat-comet-beams';
            beamRibbons.length = 0;

            const createBeamMaterial = (type) => {
                const colorHex = DETECTION_TYPES[type] || DETECTION_TYPES.ODS;
                const baseColor = new THREE.Color(colorHex);
                const headColor = baseColor.clone().lerp(new THREE.Color(0xffffff), 0.55);
                const midColor = baseColor.clone().lerp(new THREE.Color(0xffffff), 0.22);
                const tailColor = baseColor.clone().multiplyScalar(0.32);
                return new THREE.ShaderMaterial({
                transparent: true,
                depthTest: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide,
                uniforms: {
                    uBrightness: { value: beamBrightness },
                    uColorHead: { value: headColor },
                    uColorMid: { value: midColor },
                    uColorTail: { value: tailColor },
                    uHead: { value: 0.0 },
                    uTrail: { value: 0.78 }
                },
                vertexShader: `
                    attribute float beamAlpha;
                    varying vec2 vUv;
                    varying float vProgress;
                    varying float vAlpha;
                    varying float vBeamAlpha;
                    void main() {
                        vUv = uv;
                        vProgress = uv.x;
                        vAlpha = sin(3.14159265 * uv.x);
                        vBeamAlpha = beamAlpha;
                        vec3 pos = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uBrightness;
                    uniform vec3 uColorHead;
                    uniform vec3 uColorMid;
                    uniform vec3 uColorTail;
                    uniform float uHead;
                    uniform float uTrail;
                    varying vec2 vUv;
                    varying float vProgress;
                    varying float vAlpha;
                    varying float vBeamAlpha;
                    void main() {
                        float centerGlow = pow(sin(3.14159265 * vProgress), 1.45);
                        float alphaProfile = clamp(vAlpha, 0.0, 1.0);
                        float trailDist = uHead - vProgress;
                        if (trailDist < 0.0) trailDist += 1.0;
                        float trailMask = 1.0 - smoothstep(0.0, uTrail, trailDist);
                        float headGlow = exp(-trailDist * 24.0);
                        float alpha = alphaProfile * max(trailMask, headGlow * 0.95) * vBeamAlpha;
                        if (alpha <= 0.003) discard;
                        vec3 baseColor = mix(uColorTail, uColorMid, smoothstep(0.1, 0.75, vProgress));
                        vec3 color = mix(baseColor, uColorHead, headGlow);
                        float energy = 0.35 + uBrightness * (centerGlow * trailMask + headGlow);
                        gl_FragColor = vec4(color * energy, alpha);
                    }
                `
            });
            };

            const emitterByKey = {};
            sampleEmitters.forEach((emitter) => {
                emitterByKey[emitter.key] = emitter;
            });

            SAMPLE_BEAM_LINKS.forEach((config, index) => {
                const fromEmitter = emitterByKey[config.from];
                const toEmitter = emitterByKey[config.to];
                if (!fromEmitter || !toEmitter) return;
                const mesh = new THREE.Mesh(createBeamRibbonGeometry(96), createBeamMaterial(config.type));
                mesh.name = `beam-${index}-${config.from}-${config.to}`;
                mesh.renderOrder = 520;
                beamGroup.add(mesh);
                beamRibbons.push({
                    mesh,
                    from: () => fromEmitter.group,
                    to: () => toEmitter.group,
                    sourceEmitter: fromEmitter,
                    targetEmitter: toEmitter,
                    phase: config.phase,
                    name: `beam-${index}-${config.from}-${config.to}`
                });
            });

            mapGroup.add(beamGroup);
        }

        function setEffectDepthOcclusion(enabled) {
            if (effectDepthOcclusionEnabled === enabled) return;
            effectDepthOcclusionEnabled = enabled;
            const applyDepthFlag = (obj) => {
                if (!obj || !obj.material) return;
                const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                mats.forEach((mat) => {
                    if (!mat) return;
                    mat.depthTest = enabled;
                    mat.needsUpdate = true;
                });
            };
            if (pointAGroup) pointAGroup.traverse(applyDepthFlag);
            if (pointBGroup) pointBGroup.traverse(applyDepthFlag);
            if (pointCGroup) pointCGroup.traverse(applyDepthFlag);
            if (samplePointGroup) samplePointGroup.traverse(applyDepthFlag);
            beamRibbons.forEach((beam) => {
                if (beam && beam.mesh) applyDepthFlag(beam.mesh);
            });
        }

        function updatePointGroupEffects(group, pointKey, frontVisible) {
            if (!group) return;
            const useSphereOcclusion = morphProgress > 0.35;
            const core = group.getObjectByName(`${pointKey}-core`);
            const glowBase = group.getObjectByName(`${pointKey}-glow-base`);
            const glowWave = group.getObjectByName(`${pointKey}-glow-wave`);
            const label = group.getObjectByName(`${pointKey}-label`);

            if (core) {
                core.visible = pointASizeScale > 0 && frontVisible;
                core.scale.setScalar(pointASizeScale);
            }
            if (label) {
                label.visible = pointASizeScale > 0 && frontVisible;
                label.scale.set(20 * pointASizeScale, 13 * pointASizeScale, 1);
            }
            if (glowBase) {
                glowBase.visible = pointAGlowScale > 0 && frontVisible;
                glowBase.scale.setScalar(pointAGlowScale);
                glowBase.position.z = useSphereOcclusion
                    ? SPHERE_EFFECT_SURFACE_OFFSET
                    : pointAGlowOffset;
            }
            if (glowWave) {
                glowWave.visible = pointAGlowScale > 0 && frontVisible;
                const waveT = (performance.now() * 0.0007) % 1;
                const waveScale = pointAGlowScale * (0.72 + waveT * 1.08);
                glowWave.scale.setScalar(waveScale);
                glowWave.position.z = useSphereOcclusion
                    ? SPHERE_EFFECT_WAVE_OFFSET
                    : pointAGlowOffset - 0.01;
                if (glowWave.material) {
                    glowWave.material.opacity = (1 - waveT) * 0.9;
                }
            }

            const ringVisible = pointAGlowScale > 0 && frontVisible;
            for (let i = 0; i < POINT_A_RING_LAYER_COUNT; i += 1) {
                const ring = group.getObjectByName(`${pointKey}-vring-${i}`);
                if (!ring) continue;
                ring.visible = ringVisible;
                const t = ((performance.now() * 0.001 * pointARingFreq) + (i / POINT_A_RING_LAYER_COUNT)) % 1;
                const ringScale = 0.45 + t * 2.8;
                ring.scale.setScalar(ringScale);
                ring.position.set(
                    0,
                    0,
                    (useSphereOcclusion ? SPHERE_EFFECT_SURFACE_OFFSET : 0.2) + t * pointARingHeight
                );
                if (ring.material) {
                    ring.material.opacity = Math.pow(1 - t, 1.1) * 0.92;
                }
            }
        }

        function isGroupOnCameraFacingHemisphere(group) {
            if (!group || !mapGroup) return true;
            if (morphProgress < 0.35) return true;
            scene.updateMatrixWorld(true);
            group.getWorldPosition(hemisphereWorldPos);
            mapGroup.getWorldPosition(hemisphereCenter);
            hemisphereNormal.copy(hemisphereWorldPos).sub(hemisphereCenter).normalize();
            hemisphereToCamera.copy(camera.position).sub(hemisphereWorldPos).normalize();
            return hemisphereNormal.dot(hemisphereToCamera) > -0.08;
        }

        function addSampleEmitterPoints() {
            samplePointGroup = new THREE.Group();
            samplePointGroup.name = 'sample-emitter-points';
            sampleEmitters.length = 0;

            SAMPLE_COUNTRY_POINTS.forEach((item) => {
                const group = new THREE.Group();
                const flatAltitude = landHeight + 2.6;
                // 示例发射点也必须位于第二层陆地凸起表面之上，否则球体模式会被 raisedLandGroup 深度遮挡。
                const sphereAltitude = landHeight + 2.6;
                const flatPos = lonLatToPlane(item.lon, item.lat, flatAltitude);
                const spherePos = lonLatToSphere(item.lon, item.lat, sphereAltitude);
                const flatQ = new THREE.Quaternion();
                const sphereQ = new THREE.Quaternion().setFromUnitVectors(
                    new THREE.Vector3(0, 0, 1),
                    spherePos.clone().normalize()
                );
                group.userData.flatPosition = flatPos.clone();
                group.userData.spherePosition = spherePos.clone();
                group.userData.flatQuaternion = flatQ;
                group.userData.sphereQuaternion = sphereQ;
                group.position.copy(flatPos.clone().lerp(spherePos, morphProgress));
                group.quaternion.copy(flatQ).slerp(sphereQ, morphProgress);

                // 与 A 点保持一致：仅保留空心底光 + 扩散波，不使用中心实心亮点。
                const glowBase = makePointGlowDisk();
                glowBase.name = 'emitter-glow-base';
                glowBase.visible = false;
                glowBase.renderOrder = 559;
                group.add(glowBase);

                const glowWave = makePointGlowWaveDisk();
                glowWave.name = 'emitter-glow-wave';
                glowWave.visible = false;
                glowWave.renderOrder = 560;
                group.add(glowWave);

                samplePointGroup.add(group);
                sampleEmitters.push({
                    key: item.key,
                    group,
                    glowBase,
                    glowWave,
                    pulseStartTime: -1000,
                    lon: item.lon,
                    lat: item.lat
                });
            });

            mapGroup.add(samplePointGroup);
        }

            if (Math.abs(nextTargetMorph - morphProgress) < 0.001) return;
            viewMode = nextMode;
            targetMorph = nextTargetMorph;
            morphStart = nextTargetMorph;
            morphEnd = nextTargetMorph;
            morphProgress = nextTargetMorph;
            morphStartTime = performance.now();
            if (viewMode === 'sphere') {

        }

        globeContainer.addEventListener('wheel', (event) => {
            event.preventDefault();
            if (viewMode === 'sphere') {
                const delta = Math.sign(event.deltaY) * SPHERE_WHEEL_STEP;
                sphereTargetCameraZ = THREE.MathUtils.clamp(
                    sphereTargetCameraZ + delta,
                    SPHERE_MIN_CAMERA_Z,
                    SPHERE_MAX_CAMERA_Z
                );
                return;
            }
            const tiltDelta = event.deltaY > 0 ? -FLAT_TILT_STEP : FLAT_TILT_STEP;
            targetFlatTilt = THREE.MathUtils.clamp(
                targetFlatTilt + tiltDelta,
                FLAT_MAX_TILT,
                FLAT_MIN_TILT
            );

            // 平面滚轮仍以视角切换为主，同时带一点轻微放大效果。
            // 向下滚：低角度 + 轻微放大；向上滚：回正面 + 恢复原始大小。
            const zoomDelta = event.deltaY > 0 ? FLAT_ZOOM_STEP : -FLAT_ZOOM_STEP;
            targetZoom += zoomDelta;
        }, { passive: false });

        globeContainer.addEventListener('pointerdown', (event) => {
            isDragging = true;
            lastPointerX = event.clientX;
            lastPointerY = event.clientY;
            globeContainer.setPointerCapture(event.pointerId);
        });

        globeContainer.addEventListener('pointermove', (event) => {
            if (!isDragging) return;
            const deltaX = event.clientX - lastPointerX;
            const deltaY = event.clientY - lastPointerY;
            lastPointerX = event.clientX;
            lastPointerY = event.clientY;

            if (viewMode === 'sphere') {
                // 不直接改旋转角，拖动只改变目标角速度，形成阻尼惯性手感
                sphereRotationTarget.y += deltaX * sphereDragSensitivity.x;
                sphereRotationTarget.x += deltaY * sphereDragSensitivity.y;
                return;
            }

            targetPanX += deltaX / zoom;
            targetPanY -= deltaY / zoom;
        });

        globeContainer.addEventListener('pointerup', (event) => {
            isDragging = false;
            if (globeContainer.hasPointerCapture(event.pointerId)) {
                globeContainer.releasePointerCapture(event.pointerId);
            }
        });

        globeContainer.addEventListener('pointerleave', () => {
            isDragging = false;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        fetch('https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json')
            .then((res) => res.json())
            .then((geojson) => {
                countriesData = geojson.features || [];
                refreshMap();
            })
            .catch((error) => {
                console.error('国家边界数据加载失败：', error);
                showBootError('国家边界数据加载失败', error);
            });

        function updateFlatBeamEffect() {
            if (!beamGroup || !beamRibbons.length) return;
            const visible = beamEnabled;
            beamGroup.visible = visible;
            if (!visible) {
                sampleEmitters.forEach((emitter) => {
                    emitter.pulseStartTime = -1000;
                    if (emitter.glowBase) emitter.glowBase.visible = false;
                    if (emitter.glowWave) emitter.glowWave.visible = false;
                });
                return;
            }

            const durationSafe = Math.max(0.05, beamDuration);
            const time = performance.now() * 0.001;
            const emitterGlowFactor = Math.max(0, pointAGlowScale);

            beamRibbons.forEach((beam) => {
                const fromGroup = beam.from();
                const toGroup = beam.to();
                const mesh = beam.mesh;
                if (!fromGroup || !toGroup || !mesh) {
                    if (mesh) mesh.visible = false;
                    return;
                }

                const start = fromGroup.position.clone();
                const end = toGroup.position.clone();
                if (morphProgress > 0.35) {
                    const emitRadius = SPHERE_RADIUS + landHeight + BEAM_SPHERE_SURFACE_EMIT_OFFSET;
                    const startLen = start.length();
                    const endLen = end.length();
                    if (startLen > 1e-6) {
                        start.multiplyScalar(emitRadius / startLen);
                    }
                    if (endLen > 1e-6) {
                        end.multiplyScalar(emitRadius / endLen);
                    }
                }
                const fromFrontVisible = isGroupOnCameraFacingHemisphere(fromGroup);
                const toFrontVisible = isGroupOnCameraFacingHemisphere(toGroup);
                if (morphProgress > 0.35 && (!fromFrontVisible || !toFrontVisible)) {
                    mesh.visible = false;
                    return;
                }
                const dist = start.distanceTo(end);
                // 同一个国家/非常近距离不显示长光带，避免短线在点位附近乱跳。
                if (dist < 20) {
                    mesh.visible = false;
                    return;
                }

                mesh.visible = true;
                const head = (((time * beamSpeed) / durationSafe) + beam.phase) % 1;
                const sphereArcLift = morphProgress > 0.35 ? (BEAM_SPHERE_SURFACE_EMIT_OFFSET + BEAM_SPHERE_SURFACE_CLEARANCE) * 1.2 : 0;
                const arcHeight = THREE.MathUtils.clamp(
                    landHeight * (0.7 + morphProgress * 0.9)
                    + dist * (0.06 + morphProgress * 0.07)
                    + sphereArcLift,
                    8,
                    120
                );
                updateBeamRibbonGeometry(mesh.geometry, start, end, beamWidth, arcHeight, 96);
                mesh.material.uniforms.uBrightness.value = beamBrightness;
                mesh.material.uniforms.uHead.value = head;
                mesh.material.uniforms.uTrail.value = THREE.MathUtils.clamp(0.22 + beamSize * 0.09, 0.22, 0.9);

                const sourcePulse = 1.0 - THREE.MathUtils.smoothstep(head, 0.0, 0.08);
                const targetPulse = THREE.MathUtils.smoothstep(head, 0.9, 1.0);
                if (beam.sourceEmitter) {
                    if (sourcePulse > 0.6) {
                        beam.sourceEmitter.pulseStartTime = time;
                    }
                }
                if (beam.targetEmitter) {
                    if (targetPulse > 0.6) {
                        beam.targetEmitter.pulseStartTime = time;
                    }
                }
            });

            sampleEmitters.forEach((emitter) => {
                const elapsed = time - emitter.pulseStartTime;
                const pulse = THREE.MathUtils.clamp(1 - (elapsed / EMITTER_FADE_SECONDS), 0, 1);
                const frontVisible = isGroupOnCameraFacingHemisphere(emitter.group);
                const active = pulse > 0.03 && emitterGlowFactor > 0 && frontVisible;
                if (emitter.glowBase) emitter.glowBase.visible = active;
                if (emitter.glowWave) emitter.glowWave.visible = active;
                if (!active) return;

                if (emitter.glowBase) {
                    emitter.glowBase.scale.setScalar(pointAGlowScale * (0.86 + pulse * 0.2));
                    emitter.glowBase.position.z = morphProgress > 0.35
                        ? SPHERE_EFFECT_SURFACE_OFFSET
                        : pointAGlowOffset;
                    if (emitter.glowBase.material) {
                        emitter.glowBase.material.opacity = 0.88 * pulse;
                    }
                }

                if (emitter.glowWave) {
                    const waveScale = pointAGlowScale * (0.72 + (1 - pulse) * 1.08);
                    emitter.glowWave.scale.setScalar(waveScale);
                    emitter.glowWave.position.z = morphProgress > 0.35
                        ? SPHERE_EFFECT_WAVE_OFFSET
                        : pointAGlowOffset - 0.01;
                    if (emitter.glowWave.material) {
                        emitter.glowWave.material.opacity = 0.9 * pulse;
                    }
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            zoom += (targetZoom - zoom) * 0.12;
            flatTilt += (targetFlatTilt - flatTilt) * 0.14;
            if (morphProgress !== targetMorph) {
                morphProgress = targetMorph;
            }
            panX += (targetPanX - panX) * 0.16;
            panY += (targetPanY - panY) * 0.16;
            sphereCameraZ += (sphereTargetCameraZ - sphereCameraZ) * 0.14;
            sphereRotationVelocity.lerp(sphereRotationTarget, sphereRotationLerp);
            sphereRotationY += sphereRotationVelocity.y;
            sphereRotationX += sphereRotationVelocity.x;
            sphereRotationX = THREE.MathUtils.clamp(sphereRotationX, -Math.PI, Math.PI);
            sphereRotationTarget.multiplyScalar(sphereRotationDamping);
            sphereRotationVelocity.multiplyScalar(sphereRotationDamping);

            if (mapGroup) {
                if (morphProgress > 0.01) {
                    mapGroup.position.set(0, SPHERE_FIXED_Y, 0);
                    mapGroup.scale.set(1, 1, 1);
                    mapGroup.rotation.x = sphereRotationX;
                    mapGroup.rotation.y = sphereRotationY;
                    camera.position.set(0, 0, sphereCameraZ);
                    camera.lookAt(0, SPHERE_FIXED_Y + SPHERE_LOOK_AT_Y_OFFSET, 0);
                } else if (morphProgress < 0.99) {
                    mapGroup.position.set(panX, panY, 0);
                    mapGroup.scale.set(zoom, zoom, zoom);
                    mapGroup.rotation.x = flatTilt;
                    mapGroup.rotation.y = 0;
                    if (viewMode === 'flat') {
                        camera.position.set(0, 0, FLAT_FIXED_CAMERA_Z);
                        camera.lookAt(0, 0, 0);
                    }
                }
            }

            applyMorphProgress();
            scene.updateMatrixWorld(true);
            setEffectDepthOcclusion(morphProgress > 0.35);
            updatePointGroupEffects(
                pointAGroup,
                'pointA',
                isGroupOnCameraFacingHemisphere(pointAGroup)
            );
            updatePointGroupEffects(
                pointCGroup,
                'pointC',
                isGroupOnCameraFacingHemisphere(pointCGroup)
            );
            updateFlatBeamEffect();
            updateTransitionMask();

            updateDebugPanel();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
