<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Red Threat Globe Demo</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(40, 0, 0, 0.9), rgba(0, 0, 0, 1) 72%),
        #020000;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 38px;
      z-index: 10;
      color: #ff4b4b;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      text-shadow:
        0 0 8px rgba(255, 0, 0, 0.9),
        0 0 28px rgba(255, 0, 0, 0.55);
      user-select: none;
    }

    .sub-title {
      position: absolute;
      top: 66px;
      left: 40px;
      z-index: 10;
      color: rgba(255, 200, 200, 0.7);
      font-size: 13px;
      letter-spacing: 1px;
      user-select: none;
    }

    .panel {
      position: absolute;
      right: 36px;
      bottom: 36px;
      z-index: 10;
      width: 280px;
      padding: 18px;
      border: 1px solid rgba(255, 0, 0, 0.35);
      background: rgba(18, 0, 0, 0.64);
      box-shadow:
        0 0 24px rgba(255, 0, 0, 0.25),
        inset 0 0 22px rgba(255, 0, 0, 0.08);
      backdrop-filter: blur(8px);
      color: rgba(255, 230, 230, 0.9);
      user-select: none;
    }

    .panel h3 {
      margin: 0 0 12px;
      color: #ff4d4d;
      font-size: 15px;
      letter-spacing: 1px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 13px;
    }

    .row strong {
      color: #ff7777;
    }

    .scan-line {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 0, 0, 0.035) 0,
        rgba(255, 0, 0, 0.035) 1px,
        transparent 1px,
        transparent 5px
      );
      mix-blend-mode: screen;
      opacity: 0.36;
    }

    .corner {
      position: absolute;
      z-index: 10;
      width: 190px;
      height: 190px;
      border-color: rgba(255, 0, 0, 0.45);
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.5));
    }

    .corner.lt {
      top: 24px;
      left: 24px;
      border-top: 1px solid;
      border-left: 1px solid;
    }

    .corner.rb {
      right: 24px;
      bottom: 24px;
      border-right: 1px solid;
      border-bottom: 1px solid;
    }

    .tip {
      position: absolute;
      left: 38px;
      bottom: 36px;
      z-index: 10;
      color: rgba(255, 180, 180, 0.68);
      font-size: 12px;
      letter-spacing: 1px;
      user-select: none;
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="title">FUXI RED CYBER MAP</div>
    <div class="sub-title">WEBGL THREAT VISUALIZATION / ATTACK FLOW DEMO</div>

    <div class="corner lt"></div>
    <div class="corner rb"></div>

    <canvas id="canvas"></canvas>

    <div class="scan-line"></div>

    <div class="tip">LAT/LNG DATA → SPHERE POINTS → SPRITES / ARCS / PARTICLES</div>

    <div class="panel">
      <h3>LIVE THREAT STATUS</h3>
      <div class="row">
        <span>Attack Events</span>
        <strong>18,692</strong>
      </div>
      <div class="row">
        <span>DDoS</span>
        <strong>4,381</strong>
      </div>
      <div class="row">
        <span>Exploit</span>
        <strong>2,906</strong>
      </div>
      <div class="row">
        <span>Malware</span>
        <strong>8,514</strong>
      </div>
      <div class="row">
        <span>Risk Level</span>
        <strong>HIGH</strong>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    const canvas = document.getElementById("canvas");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      42,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(0, 0, 13);

    const renderer = new THREE.WebGLRenderer({
      canvas: canvas,
      antialias: true,
      alpha: true
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const rootGroup = new THREE.Group();
    scene.add(rootGroup);

    const earthGroup = new THREE.Group();
    rootGroup.add(earthGroup);

    const radius = 4.25;

    /**
     * 加载世界地图贴图
     * 如果你本地没联网，可以把这张图下载到本地：
     * https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg
     * 然后把下面路径改成：./land_ocean_ice_cloud_2048.jpg
     */
    const textureLoader = new THREE.TextureLoader();
    textureLoader.setCrossOrigin("anonymous");

    const earthTexture = textureLoader.load(
      "https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg"
    );

    /**
     * 地球主球体：红黑色调
     */
    const earthGeometry = new THREE.SphereGeometry(radius, 128, 128);

    const earthMaterial = new THREE.MeshPhongMaterial({
      map: earthTexture,
      color: 0x7c1d1d,
      emissive: 0x1d0000,
      emissiveIntensity: 0.75,
      shininess: 8,
      transparent: true,
      opacity: 0.96
    });

    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earthGroup.add(earth);

    /**
     * 深色覆盖层：让整体更像暗红色安全大屏
     */
    const darkOverlayGeometry = new THREE.SphereGeometry(radius + 0.012, 128, 128);

    const darkOverlayMaterial = new THREE.MeshBasicMaterial({
      color: 0x160000,
      transparent: true,
      opacity: 0.28,
      depthWrite: false
    });

    const darkOverlay = new THREE.Mesh(darkOverlayGeometry, darkOverlayMaterial);
    earthGroup.add(darkOverlay);

    /**
     * 加深球面线条：经纬网格
     */
    const gridGeometry = new THREE.SphereGeometry(radius + 0.025, 64, 64);

    const gridMaterial = new THREE.MeshBasicMaterial({
      color: 0x060000,
      wireframe: true,
      transparent: true,
      opacity: 0.45,
      depthWrite: false
    });

    const gridSphere = new THREE.Mesh(gridGeometry, gridMaterial);
    earthGroup.add(gridSphere);

    /**
     * 红色细网格，增加科技感
     */
    const redGridGeometry = new THREE.SphereGeometry(radius + 0.035, 96, 96);

    const redGridMaterial = new THREE.MeshBasicMaterial({
      color: 0x7a0000,
      wireframe: true,
      transparent: true,
      opacity: 0.12,
      depthWrite: false
    });

    const redGridSphere = new THREE.Mesh(redGridGeometry, redGridMaterial);
    earthGroup.add(redGridSphere);

    /**
     * 外层辉光
     */
    const glowGeometry = new THREE.SphereGeometry(radius + 0.22, 128, 128);

    const glowMaterial = new THREE.MeshBasicMaterial({
      color: 0xff2222,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide,
      depthWrite: false
    });

    const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
    earthGroup.add(glowSphere);

    /**
     * 经纬度转球面坐标
     */
    function latLngToVector3(lat, lng, r) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lng + 180) * Math.PI / 180;

      const x = -r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.cos(phi);
      const z = r * Math.sin(phi) * Math.sin(theta);

      return new THREE.Vector3(x, y, z);
    }

    /**
     * 生成圆形发光贴图
     */
    function createGlowTexture(color1, color2) {
      const size = 128;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;

      const ctx = canvas.getContext("2d");
      const gradient = ctx.createRadialGradient(
        size / 2,
        size / 2,
        0,
        size / 2,
        size / 2,
        size / 2
      );

      gradient.addColorStop(0, color1);
      gradient.addColorStop(0.35, color1);
      gradient.addColorStop(1, color2);

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      return new THREE.CanvasTexture(canvas);
    }

    const redGlowTexture = createGlowTexture("rgba(255,80,80,1)", "rgba(255,0,0,0)");
    const orangeGlowTexture = createGlowTexture("rgba(255,180,70,1)", "rgba(255,80,0,0)");
    const blueGlowTexture = createGlowTexture("rgba(70,160,255,1)", "rgba(0,80,255,0)");
    const greenGlowTexture = createGlowTexture("rgba(80,255,130,1)", "rgba(0,255,80,0)");
    const purpleGlowTexture = createGlowTexture("rgba(190,100,255,1)", "rgba(160,0,255,0)");

    const colorTextures = [
      redGlowTexture,
      orangeGlowTexture,
      blueGlowTexture,
      greenGlowTexture,
      purpleGlowTexture
    ];

    /**
     * 创建文字 Sprite
     */
    function createTextSprite(text, color) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 80;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.font = "bold 28px Arial";
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.fillText(text, 12, 48);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        opacity: 0.88,
        depthTest: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.72, 0.22, 1);

      return sprite;
    }

    /**
     * 威胁事件数据
     */
    const cities = [
      { name: "Beijing", lat: 39.9, lng: 116.4 },
      { name: "Tokyo", lat: 35.6, lng: 139.7 },
      { name: "Seoul", lat: 37.5, lng: 126.9 },
      { name: "Singapore", lat: 1.3, lng: 103.8 },
      { name: "Mumbai", lat: 19.0, lng: 72.8 },
      { name: "Moscow", lat: 55.7, lng: 37.6 },
      { name: "London", lat: 51.5, lng: -0.1 },
      { name: "Paris", lat: 48.8, lng: 2.3 },
      { name: "Berlin", lat: 52.5, lng: 13.4 },
      { name: "New York", lat: 40.7, lng: -74.0 },
      { name: "San Francisco", lat: 37.7, lng: -122.4 },
      { name: "Los Angeles", lat: 34.0, lng: -118.2 },
      { name: "Toronto", lat: 43.6, lng: -79.3 },
      { name: "São Paulo", lat: -23.5, lng: -46.6 },
      { name: "Sydney", lat: -33.8, lng: 151.2 },
      { name: "Jakarta", lat: -6.2, lng: 106.8 },
      { name: "Bangkok", lat: 13.7, lng: 100.5 },
      { name: "Dubai", lat: 25.2, lng: 55.2 },
      { name: "Johannesburg", lat: -26.2, lng: 28.0 },
      { name: "Cairo", lat: 30.0, lng: 31.2 }
    ];

    const attackTypes = [
      "DDoS",
      "Botnet",
      "Exploit",
      "Malware",
      "Trojan",
      "Worm",
      "C2",
      "Scan",
      "APT",
      "IDS"
    ];

    const colorList = [
      "#ff3b3b",
      "#ff9900",
      "#28a8ff",
      "#4dff88",
      "#bb66ff",
      "#ff3fb4"
    ];

    /**
     * 点、标签、弧线、粒子分组
     */
    const pointGroup = new THREE.Group();
    const labelGroup = new THREE.Group();
    const arcGroup = new THREE.Group();
    const movingParticleGroup = new THREE.Group();

    earthGroup.add(pointGroup);
    earthGroup.add(labelGroup);
    earthGroup.add(arcGroup);
    earthGroup.add(movingParticleGroup);

    /**
     * 创建球面攻击点
     */
    function createThreatPoint(lat, lng, index) {
      const texture = colorTextures[index % colorTextures.length];

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        opacity: 0.95,
        depthTest: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.position.copy(latLngToVector3(lat, lng, radius + 0.08));

      const size = 0.16 + Math.random() * 0.12;
      sprite.scale.set(size, size, size);

      sprite.userData.baseSize = size;
      sprite.userData.pulseSpeed = 0.015 + Math.random() * 0.025;
      sprite.userData.phase = Math.random() * Math.PI * 2;

      pointGroup.add(sprite);

      return sprite;
    }

    /**
     * 创建攻击弧线
     */
    function createArc(from, to, color) {
      const start = latLngToVector3(from.lat, from.lng, radius + 0.1);
      const end = latLngToVector3(to.lat, to.lng, radius + 0.1);

      const distance = start.distanceTo(end);
      const mid = start.clone().add(end).multiplyScalar(0.5);
      mid.normalize().multiplyScalar(radius + 0.65 + distance * 0.18);

      const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
      const points = curve.getPoints(96);

      const geometry = new THREE.BufferGeometry().setFromPoints(points);

      const material = new THREE.LineBasicMaterial({
        color: new THREE.Color(color),
        transparent: true,
        opacity: 0.72,
        depthTest: true,
        depthWrite: false
      });

      const line = new THREE.Line(geometry, material);
      arcGroup.add(line);

      return {
        line,
        curve,
        color
      };
    }

    /**
     * 创建沿弧线移动的粒子
     */
    function createMovingParticle(curve, color, delay) {
      const texture = createGlowTexture("rgba(255,255,255,1)", "rgba(255,0,0,0)");

      const material = new THREE.SpriteMaterial({
        map: texture,
        color: new THREE.Color(color),
        transparent: true,
        opacity: 0.95,
        depthTest: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.12, 0.12, 0.12);

      sprite.userData.curve = curve;
      sprite.userData.progress = delay;
      sprite.userData.speed = 0.0035 + Math.random() * 0.0025;

      movingParticleGroup.add(sprite);

      return sprite;
    }

    /**
     * 生成多条威胁事件
     */
    const arcs = [];

    const manualEvents = [
      ["San Francisco", "Tokyo", "#ff33aa"],
      ["New York", "Beijing", "#ff3b3b"],
      ["Moscow", "Singapore", "#4dff88"],
      ["London", "Tokyo", "#28a8ff"],
      ["Paris", "Mumbai", "#bb66ff"],
      ["Dubai", "Sydney", "#ff9900"],
      ["São Paulo", "London", "#ff3b3b"],
      ["Los Angeles", "Seoul", "#28a8ff"],
      ["Berlin", "Beijing", "#4dff88"],
      ["Toronto", "Paris", "#ff9900"]
    ];

    function findCity(name) {
      return cities.find(item => item.name === name);
    }

    manualEvents.forEach(function (item, index) {
      const from = findCity(item[0]);
      const to = findCity(item[1]);
      const color = item[2];

      const arc = createArc(from, to, color);
      arcs.push(arc);

      createMovingParticle(arc.curve, color, Math.random());

      createThreatPoint(from.lat, from.lng, index);
      createThreatPoint(to.lat, to.lng, index + 2);

      const label = createTextSprite(
        attackTypes[index % attackTypes.length],
        color
      );

      const labelPosition = latLngToVector3(
        to.lat + (Math.random() - 0.5) * 4,
        to.lng + (Math.random() - 0.5) * 4,
        radius + 0.18
      );

      label.position.copy(labelPosition);
      labelGroup.add(label);
    });

    /**
     * 大量随机点和文字，模拟原图上密集攻击数据
     */
    for (let i = 0; i < 120; i++) {
      const city = cities[Math.floor(Math.random() * cities.length)];
      const lat = city.lat + (Math.random() - 0.5) * 18;
      const lng = city.lng + (Math.random() - 0.5) * 24;

      createThreatPoint(lat, lng, i);

      if (i % 3 === 0) {
        const type = attackTypes[Math.floor(Math.random() * attackTypes.length)];
        const color = colorList[i % colorList.length];

        const label = createTextSprite(type, color);
        label.position.copy(latLngToVector3(lat, lng, radius + 0.16));
        label.scale.set(0.42, 0.13, 1);
        labelGroup.add(label);
      }
    }

    /**
     * 扫描环
     */
    const ringMaterial = new THREE.MeshBasicMaterial({
      color: 0xff2222,
      transparent: true,
      opacity: 0.38,
      depthWrite: false
    });

    const ring1 = new THREE.Mesh(
      new THREE.TorusGeometry(radius + 0.18, 0.01, 8, 240),
      ringMaterial
    );
    ring1.rotation.x = Math.PI / 2;
    earthGroup.add(ring1);

    const ring2 = new THREE.Mesh(
      new THREE.TorusGeometry(radius + 0.35, 0.008, 8, 240),
      new THREE.MeshBasicMaterial({
        color: 0xff7777,
        transparent: true,
        opacity: 0.22,
        depthWrite: false
      })
    );
    ring2.rotation.x = Math.PI / 2.45;
    ring2.rotation.y = Math.PI / 5;
    earthGroup.add(ring2);

    /**
     * 背景星空
     */
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 1600;
    const starPositions = [];

    for (let i = 0; i < starCount; i++) {
      const x = (Math.random() - 0.5) * 95;
      const y = (Math.random() - 0.5) * 95;
      const z = (Math.random() - 0.5) * 95;
      starPositions.push(x, y, z);
    }

    starGeometry.setAttribute(
      "position",
      new THREE.Float32BufferAttribute(starPositions, 3)
    );

    const stars = new THREE.Points(
      starGeometry,
      new THREE.PointsMaterial({
        color: 0xffb0b0,
        size: 0.03,
        transparent: true,
        opacity: 0.55
      })
    );

    scene.add(stars);

    /**
     * 光照
     */
    const ambientLight = new THREE.AmbientLight(0xff3333, 0.72);
    scene.add(ambientLight);

    const keyLight = new THREE.PointLight(0xff5555, 2.8);
    keyLight.position.set(8, 6, 10);
    scene.add(keyLight);

    const sideLight = new THREE.PointLight(0x440000, 2);
    sideLight.position.set(-8, -5, -6);
    scene.add(sideLight);

    /**
     * 正面可见性处理：避免背面文字穿透太明显
     */
    function updateFrontVisibility(object) {
      const worldPosition = new THREE.Vector3();
      object.getWorldPosition(worldPosition);

      const normal = worldPosition.clone().sub(rootGroup.position).normalize();
      const cameraDirection = camera.position.clone().normalize();

      const dot = normal.dot(cameraDirection);

      object.visible = dot > -0.12;
    }

    /**
     * 鼠标视差
     */
    let mouseX = 0;
    let mouseY = 0;

    window.addEventListener("mousemove", function (event) {
      mouseX = (event.clientX / window.innerWidth - 0.5) * 0.38;
      mouseY = (event.clientY / window.innerHeight - 0.5) * 0.38;
    });

    /**
     * 默认让亚洲区域朝向前面，接近你截图效果
     */
    earthGroup.rotation.y = -0.72;
    earthGroup.rotation.x = -0.12;
    earthGroup.rotation.z = 0.03;

    /**
     * 动画循环
     */
    function animate() {
      requestAnimationFrame(animate);

      const time = Date.now();

      earthGroup.rotation.y += 0.0011;

      gridSphere.rotation.y += 0.0006;
      redGridSphere.rotation.y += 0.0009;
      glowSphere.rotation.y += 0.0011;

      ring1.rotation.z += 0.0022;
      ring2.rotation.z -= 0.0016;

      stars.rotation.y += 0.00018;

      pointGroup.children.forEach(function (point) {
        const pulse =
          point.userData.baseSize *
          (1.0 + Math.sin(time * point.userData.pulseSpeed + point.userData.phase) * 0.45);

        point.scale.set(pulse, pulse, pulse);
        updateFrontVisibility(point);
      });

      labelGroup.children.forEach(function (label) {
        updateFrontVisibility(label);
      });

      movingParticleGroup.children.forEach(function (particle) {
        particle.userData.progress += particle.userData.speed;

        if (particle.userData.progress > 1) {
          particle.userData.progress = 0;
        }

        const position = particle.userData.curve.getPoint(particle.userData.progress);
        particle.position.copy(position);

        updateFrontVisibility(particle);
      });

      camera.position.x += (mouseX - camera.position.x * 0.04) * 0.025;
      camera.position.y += (-mouseY - camera.position.y * 0.04) * 0.025;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();

    /**
     * 窗口自适应
     */
    window.addEventListener("resize", function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
