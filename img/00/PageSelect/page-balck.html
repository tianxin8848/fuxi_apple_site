<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全行业 红黑｜Apple风黑阶体系</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}
body {
  background: #0F1014;
  padding: 40px;
}
.demo-item {
  padding: 24px 30px;
  border-radius: 12px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid #2A2B35;
}
.label {
  color: #F5F5F7;
  font-size: 15px;
}
.code {
  color: #86868B;
  font-size: 13px;
}
.red-tag {
  display: inline-block;
  padding: 4px 10px;
  background: #D82E2F;
  border-radius: 4px;
  color: #fff;
  font-size: 12px;
  margin-left: 20px;
}

/* 5级 Apple风 安全黑阶 */
.bg-1 { background: #0F1014; }
.bg-2 { background: #16171D; }
.bg-3 { background: #1C1D24; }
.bg-4 { background: #23242C; }
.bg-5 { background: #2A2B35; }
</style>
</head>
<body>

<div class="demo-item bg-1">
  <div>
    <div class="label">① 页面主背景 · 安全行业首选</div>
    <div class="code">#0F1014</div>
  </div>
  <span class="red-tag">安全主黑</span>
</div>

<div class="demo-item bg-2">
  <div>
    <div class="label">② 卡片/容器背景</div>
    <div class="code">#16171D</div>
  </div>
</div>

<div class="demo-item bg-3">
  <div>
    <div class="label">③ 导航 / 悬浮选中</div>
    <div class="code">#1C1D24</div>
  </div>
</div>

<div class="demo-item bg-4">
  <div>
    <div class="label">④ 分割区域 / 次要模块</div>
    <div class="code">#23242C</div>
  </div>
</div>

<div class="demo-item bg-5">
  <div>
    <div class="label">⑤ 边框 / 弱底色</div>
    <div class="code">#2A2B35</div>
  </div>
</div>

</body>
</html>
