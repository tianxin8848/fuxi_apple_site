<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商业高级黑色背景 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: #f5f5f5;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        .item {
            padding: 30px 40px;
            margin: 12px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .color-code {
            margin-top: 8px;
            color: #aaa;
            font-size: 14px;
        }

        /* 全部商业黑色 */
        .b1 { background-color: #121212; }
        .b2 { background-color: #000000; }
        .b3 { background-color: #1a1a1a; }
        .b4 { background-color: #0f1724; }
        .b5 { background-color: #181818; }
        .b6 { background-color: #0d0d0d; }
        .b7 { background: linear-gradient(140deg, #111111, #151515); }
    </style>
</head>
<body>
    <div class="item b1">
        <h3>标准大厂商业黑｜首选</h3>
        <div class="color-code">background: #121212</div>
    </div>

    <div class="item b2">
        <h3>极致纯黑｜高对比</h3>
        <div class="color-code">background: #000000</div>
    </div>

    <div class="item b3">
        <h3>商务炭黑｜稳重B端</h3>
        <div class="color-code">background: #1a1a1a</div>
    </div>

    <div class="item b4">
        <h3>科技藏青黑｜网络安全/科技企业</h3>
        <div class="color-code">background: #0f1724</div>
    </div>

    <div class="item b5">
        <h3>哑光柔和黑｜耐看不伤眼</h3>
        <div class="color-code">background: #181818</div>
    </div>

    <div class="item b6">
        <h3>冷调极深黑｜极简高级</h3>
        <div class="color-code">background: #0d0d0d</div>
    </div>

    <div class="item b7">
        <h3>微渐变质感黑｜高端质感</h3>
        <div class="color-code">background: linear-gradient(140deg, #111111, #151515)</div>
    </div>
</body>
</html>
