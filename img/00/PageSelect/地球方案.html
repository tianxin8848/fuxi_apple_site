<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Red Cyber Threat Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #020204;
    font-family: "Inter", "Microsoft YaHei", Arial, sans-serif;
    color: #ff3b3b;
  }

  #app {
    position: fixed;
    inset: 0;
  }

  .hud {
    position: fixed;
    top: 24px;
    bottom: 24px;
    width: 280px;
    padding: 18px;
    background: linear-gradient(180deg, rgba(30,0,0,.68), rgba(5,0,0,.32));
    border: 1px solid rgba(255,40,40,.38);
    box-shadow: 0 0 30px rgba(255,0,0,.18), inset 0 0 25px rgba(255,0,0,.08);
    backdrop-filter: blur(8px);
    z-index: 10;
  }

  .left { left: 24px; }
  .right { right: 24px; }

  .title {
    font-size: 15px;
    letter-spacing: 3px;
    color: #ff6666;
    margin-bottom: 18px;
    text-transform: uppercase;
  }

  .stat {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,60,60,.16);
    font-size: 13px;
  }

  .num {
    color: #fff;
    text-shadow: 0 0 10px red;
  }

  .log {
    margin-top: 14px;
    font-size: 12px;
    line-height: 1.75;
    color: #ff8a8a;
  }

  .center-title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }

  .center-title h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 6px;
    color: #ff3030;
    text-shadow: 0 0 18px red;
  }

  .center-title p {
    margin-top: 8px;
    color: rgba(255,120,120,.75);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .scanline {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,0,0,.035) 1px, transparent 1px);
    background-size: 100% 4px;
    mix-blend-mode: screen;
    z-index: 30;
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 180px #000;
    z-index: 31;
  }
</style>
</head>
<body>
<div id="app"></div>

<div class="center-title">
  <h1>CYBER THREAT MAP</h1>
  <p>REAL-TIME GLOBAL ATTACK VISUALIZATION</p>
</div>

<div class="hud left">
  <div class="title">Attack Types</div>
  <div class="stat"><span>Malware</span><span class="num" id="s1">1284</span></div>
  <div class="stat"><span>Exploit</span><span class="num" id="s2">872</span></div>
  <div class="stat"><span>Botnet</span><span class="num" id="s3">441</span></div>
  <div class="stat"><span>Phishing</span><span class="num" id="s4">936</span></div>
  <div class="log" id="logLeft"></div>
</div>

<div class="hud right">
  <div class="title">Top Targets</div>
  <div class="stat"><span>China</span><span class="num">24%</span></div>
  <div class="stat"><span>United States</span><span class="num">19%</span></div>
  <div class="stat"><span>Japan</span><span class="num">13%</span></div>
  <div class="stat"><span>Germany</span><span class="num">8%</span></div>
  <div class="log" id="logRight"></div>
</div>

<div class="scanline"></div>
<div class="vignette"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "OrbitControls": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js",
    "EffectComposer": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js",
    "RenderPass": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js",
    "UnrealBloomPass": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "OrbitControls";
import { EffectComposer } from "EffectComposer";
import { RenderPass } from "RenderPass";
import { UnrealBloomPass } from "UnrealBloomPass";

const container = document.getElementById("app");

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050000, 0.045);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 0.8, 7.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x020204, 1);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 4.2;
controls.maxDistance = 10;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.28;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.75,
  0.45,
  0.08
);
composer.addPass(bloom);

const globeGroup = new THREE.Group();
scene.add(globeGroup);

const R = 2.15;

/* 地球主体 */
const globeGeo = new THREE.SphereGeometry(R, 128, 128);
const globeMat = new THREE.MeshPhongMaterial({
  color: 0x170000,
  emissive: 0x250000,
  emissiveIntensity: 0.9,
  transparent: true,
  opacity: 0.96,
  shininess: 18
});
const globe = new THREE.Mesh(globeGeo, globeMat);
globeGroup.add(globe);

/* 外层暗红透明光晕 */
const haloGeo = new THREE.SphereGeometry(R * 1.015, 128, 128);
const haloMat = new THREE.MeshBasicMaterial({
  color: 0xff0000,
  transparent: true,
  opacity: 0.06,
  wireframe: true
});
const halo = new THREE.Mesh(haloGeo, haloMat);
globeGroup.add(halo);

/* 经纬线 */
const gridMat = new THREE.LineBasicMaterial({
  color: 0x7a0000,
  transparent: true,
  opacity: 0.32
});

for (let lat = -75; lat <= 75; lat += 15) {
  const points = [];
  for (let lon = -180; lon <= 180; lon += 3) {
    points.push(latLonToVec3(lat, lon, R * 1.004));
  }
  globeGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(points),
    gridMat
  ));
}

for (let lon = -180; lon < 180; lon += 15) {
  const points = [];
  for (let lat = -85; lat <= 85; lat += 3) {
    points.push(latLonToVec3(lat, lon, R * 1.004));
  }
  globeGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(points),
    gridMat
  ));
}

/* 粗略大陆红色粒子，模拟 Kaspersky 那种密集数据感 */
const landDots = new THREE.Group();
globeGroup.add(landDots);

const landRegions = [
  [35, 105, 900], [23, 78, 520], [36, 138, 320], [50, 10, 600],
  [40, -100, 620], [-15, -55, 360], [0, 20, 420], [-25, 135, 260],
  [55, 90, 420], [30, 45, 260]
];

const dotGeo = new THREE.BufferGeometry();
const dotPositions = [];

for (const [clat, clon, count] of landRegions) {
  for (let i = 0; i < count; i++) {
    const lat = clat + rand(-14, 14);
    const lon = clon + rand(-22, 22);
    const v = latLonToVec3(lat, lon, R * 1.018);
    dotPositions.push(v.x, v.y, v.z);
  }
}

dotGeo.setAttribute("position", new THREE.Float32BufferAttribute(dotPositions, 3));
const dotMat = new THREE.PointsMaterial({
  color: 0xff2b2b,
  size: 0.012,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const dots = new THREE.Points(dotGeo, dotMat);
landDots.add(dots);

/* 星空 */
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 1600; i++) {
  const v = new THREE.Vector3(
    rand(-60, 60),
    rand(-60, 60),
    rand(-60, 60)
  );
  if (v.length() < 10) v.setLength(10 + Math.random() * 40);
  starPos.push(v.x, v.y, v.z);
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0xff5555,
  size: 0.025,
  transparent: true,
  opacity: 0.35,
  blending: THREE.AdditiveBlending
})));

/* 灯光 */
scene.add(new THREE.AmbientLight(0xff2222, 0.9));
const light = new THREE.PointLight(0xff3333, 9, 20);
light.position.set(4, 3, 6);
scene.add(light);

/* 彗星弧线效果 - 确保弧线不穿过地球表面 */
function createArcCurve(startLat, startLng, endLat, endLng) {
  const surfaceRadius = R * 1.01;
  const start = latLonToVec3(startLat, startLng, surfaceRadius);
  const end = latLonToVec3(endLat, endLng, surfaceRadius);

  const startDir = start.clone().normalize();
  const endDir = end.clone().normalize();

  const midDir = startDir.clone().add(endDir).normalize();
  const angle = startDir.angleTo(endDir);
  const minElevation = Math.sin(angle * 0.5) * 0.2 + 0.1;
  const elevation = minElevation + Math.random() * 0.25;
  const arcHeight = surfaceRadius * (1 + elevation);

  const midPoint = midDir.clone().multiplyScalar(arcHeight);

  const curve = new THREE.CatmullRomCurve3([start, midPoint, end]);

  const numPoints = 64;
  const points = curve.getPoints(numPoints);
  for (let i = 0; i < numPoints; i++) {
    const p = points[i];
    const dist = p.length();
    if (dist < surfaceRadius) {
      p.normalize().multiplyScalar(surfaceRadius);
    }
  }

  const fixedCurve = new THREE.CatmullRomCurve3(points);
  return fixedCurve;
}

function createCometArc(curve, color = "#ff2244") {
  const geometry = new THREE.TubeGeometry(curve, 160, 0.012, 8, false);
  const material = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: Math.random() },
      uColor: { value: new THREE.Color(color) },
      uTailLength: { value: 0.22 }
    },
    vertexShader: `
      varying float vProgress;
      void main() {
        vProgress = uv.x;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uColor;
      uniform float uTailLength;
      varying float vProgress;

      void main() {
        float head = fract(uTime);
        float d = head - vProgress;
        if (d < 0.0) d += 1.0;

        float tail = smoothstep(uTailLength, 0.0, d);
        float headGlow = smoothstep(0.03, 0.0, abs(d));
        float alpha = tail * 0.85 + headGlow * 1.5;
        vec3 finalColor = mix(uColor, vec3(1.0, 0.82, 0.82), headGlow);

        gl_FragColor = vec4(finalColor, alpha);
      }
    `
  });
  const mesh = new THREE.Mesh(geometry, material);
  globeGroup.add(mesh);
  return material;
}

function createCometHead(curve, color = "#ff1e3c") {
  const headColor = color === "#1e88ff" ? "#e8f4ff" : "#ffe8e8";

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.045, 24, 24),
    new THREE.MeshBasicMaterial({
      color: headColor,
      transparent: true,
      opacity: 1,
      blending: THREE.AdditiveBlending
    })
  );
  globeGroup.add(head);
  return { mesh: head, curve, progress: Math.random() };
}

const cometConfigs = [
  { startLat: 39.9, startLng: 116.4, endLat: 40.7, endLng: -74, color: "#ff1e3c" },
  { startLat: 51.5, startLng: -0.1, endLat: 35.6, endLng: 139.7, color: "#1e88ff" },
  { startLat: -23.5, startLng: -46.6, endLat: 55.7, endLng: 37.6, color: "#ff1e3c" },
  { startLat: 1.35, startLng: 103.8, endLat: 48.8, endLng: 2.3, color: "#1e88ff" },
  { startLat: 35, startLng: 105, endLat: -33.8, endLng: 151.2, color: "#ff1e3c" },
  { startLat: 25.2, startLng: 55.2, endLat: 34.0, endLng: -118.2, color: "#1e88ff" }
];

const cometCurves = [];
const cometMaterials = [];
const cometHeads = [];
const cometColors = [];

cometConfigs.forEach((config) => {
  const curve = createArcCurve(config.startLat, config.startLng, config.endLat, config.endLng);
  cometCurves.push(curve);
  cometMaterials.push(createCometArc(curve, config.color));
  cometColors.push(config.color);
  cometHeads.push(createCometHead(curve, config.color));
});

function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;

  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function addLog(text) {
  const left = document.getElementById("logLeft");
  const right = document.getElementById("logRight");
  const time = new Date().toLocaleTimeString();

  left.innerHTML = `[${time}] ${text}<br>` + left.innerHTML;
  right.innerHTML = `[TRACE] ${text}<br>` + right.innerHTML;

  left.innerHTML = left.innerHTML.split("<br>").slice(0, 9).join("<br>");
  right.innerHTML = right.innerHTML.split("<br>").slice(0, 9).join("<br>");
}

function animate() {
  requestAnimationFrame(animate);

  globeGroup.rotation.y += 0.0008;
  halo.rotation.y -= 0.0015;
  dots.rotation.y += 0.0004;

  cometMaterials.forEach((mat, index) => {
    mat.uniforms.uTime.value += 0.004 + index * 0.0005;
  });

  cometHeads.forEach((item, index) => {
    item.progress += 0.004 + index * 0.0005;
    item.progress %= 1;
    const pos = item.curve.getPoint(item.progress);
    item.mesh.position.copy(pos);
    const s = 1 + Math.sin(Date.now() * 0.015 + index) * 0.25;
    item.mesh.scale.setScalar(s);
  });

  controls.update();
  composer.render();
}

animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
