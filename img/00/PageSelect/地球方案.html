<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Red Cyber Threat Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #020204;
    font-family: "Inter", "Microsoft YaHei", Arial, sans-serif;
    color: #ff3b3b;
  }

  #app {
    position: fixed;
    inset: 0;
  }

  .hud {
    position: fixed;
    top: 24px;
    bottom: 24px;
    width: 280px;
    padding: 18px;
    background: linear-gradient(180deg, rgba(30,0,0,.68), rgba(5,0,0,.32));
    border: 1px solid rgba(255,40,40,.38);
    box-shadow: 0 0 30px rgba(255,0,0,.18), inset 0 0 25px rgba(255,0,0,.08);
    backdrop-filter: blur(8px);
    z-index: 10;
  }

  .left { left: 24px; }
  .right { right: 24px; }

  .title {
    font-size: 15px;
    letter-spacing: 3px;
    color: #ff6666;
    margin-bottom: 18px;
    text-transform: uppercase;
  }

  .stat {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,60,60,.16);
    font-size: 13px;
  }

  .num {
    color: #fff;
    text-shadow: 0 0 10px red;
  }

  .log {
    margin-top: 14px;
    font-size: 12px;
    line-height: 1.75;
    color: #ff8a8a;
  }

  .center-title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }

  .center-title h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 6px;
    color: #ff3030;
    text-shadow: 0 0 18px red;
  }

  .center-title p {
    margin-top: 8px;
    color: rgba(255,120,120,.75);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .scanline {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,0,0,.035) 1px, transparent 1px);
    background-size: 100% 4px;
    mix-blend-mode: screen;
    z-index: 30;
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 180px #000;
    z-index: 31;
  }
</style>
</head>
<body>
<div id="app"></div>

<div class="center-title">
  <h1>CYBER THREAT MAP</h1>
  <p>REAL-TIME GLOBAL ATTACK VISUALIZATION</p>
</div>

<div class="hud left">
  <div class="title">Attack Types</div>
  <div class="stat"><span>Malware</span><span class="num" id="s1">1284</span></div>
  <div class="stat"><span>Exploit</span><span class="num" id="s2">872</span></div>
  <div class="stat"><span>Botnet</span><span class="num" id="s3">441</span></div>
  <div class="stat"><span>Phishing</span><span class="num" id="s4">936</span></div>
  <div class="log" id="logLeft"></div>
</div>

<div class="hud right">
  <div class="title">Top Targets</div>
  <div class="stat"><span>China</span><span class="num">24%</span></div>
  <div class="stat"><span>United States</span><span class="num">19%</span></div>
  <div class="stat"><span>Japan</span><span class="num">13%</span></div>
  <div class="stat"><span>Germany</span><span class="num">8%</span></div>
  <div class="log" id="logRight"></div>
</div>

<div class="scanline"></div>
<div class="vignette"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "OrbitControls": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js",
    "EffectComposer": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js",
    "RenderPass": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/RenderPass.js",
    "UnrealBloomPass": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "OrbitControls";
import { EffectComposer } from "EffectComposer";
import { RenderPass } from "RenderPass";
import { UnrealBloomPass } from "UnrealBloomPass";

const container = document.getElementById("app");

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050000, 0.045);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 0.8, 7.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x020204, 1);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 4.2;
controls.maxDistance = 10;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.28;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.75,
  0.45,
  0.08
);
composer.addPass(bloom);

const globeGroup = new THREE.Group();
scene.add(globeGroup);

const R = 2.15;

/* 地球主体 */
const globeGeo = new THREE.SphereGeometry(R, 128, 128);
const globeMat = new THREE.MeshPhongMaterial({
  color: 0x170000,
  emissive: 0x250000,
  emissiveIntensity: 0.9,
  transparent: true,
  opacity: 0.96,
  shininess: 18
});
const globe = new THREE.Mesh(globeGeo, globeMat);
globeGroup.add(globe);

/* 外层暗红透明光晕 */
const haloGeo = new THREE.SphereGeometry(R * 1.015, 128, 128);
const haloMat = new THREE.MeshBasicMaterial({
  color: 0xff0000,
  transparent: true,
  opacity: 0.06,
  wireframe: true
});
const halo = new THREE.Mesh(haloGeo, haloMat);
globeGroup.add(halo);

/* 经纬线 */
const gridMat = new THREE.LineBasicMaterial({
  color: 0x7a0000,
  transparent: true,
  opacity: 0.32
});

for (let lat = -75; lat <= 75; lat += 15) {
  const points = [];
  for (let lon = -180; lon <= 180; lon += 3) {
    points.push(latLonToVec3(lat, lon, R * 1.004));
  }
  globeGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(points),
    gridMat
  ));
}

for (let lon = -180; lon < 180; lon += 15) {
  const points = [];
  for (let lat = -85; lat <= 85; lat += 3) {
    points.push(latLonToVec3(lat, lon, R * 1.004));
  }
  globeGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(points),
    gridMat
  ));
}

/* 粗略大陆红色粒子，模拟 Kaspersky 那种密集数据感 */
const landDots = new THREE.Group();
globeGroup.add(landDots);

const landRegions = [
  [35, 105, 900], [23, 78, 520], [36, 138, 320], [50, 10, 600],
  [40, -100, 620], [-15, -55, 360], [0, 20, 420], [-25, 135, 260],
  [55, 90, 420], [30, 45, 260]
];

const dotGeo = new THREE.BufferGeometry();
const dotPositions = [];

for (const [clat, clon, count] of landRegions) {
  for (let i = 0; i < count; i++) {
    const lat = clat + rand(-14, 14);
    const lon = clon + rand(-22, 22);
    const v = latLonToVec3(lat, lon, R * 1.018);
    dotPositions.push(v.x, v.y, v.z);
  }
}

dotGeo.setAttribute("position", new THREE.Float32BufferAttribute(dotPositions, 3));
const dotMat = new THREE.PointsMaterial({
  color: 0xff2b2b,
  size: 0.012,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const dots = new THREE.Points(dotGeo, dotMat);
landDots.add(dots);

/* 星空 */
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 1600; i++) {
  const v = new THREE.Vector3(
    rand(-60, 60),
    rand(-60, 60),
    rand(-60, 60)
  );
  if (v.length() < 10) v.setLength(10 + Math.random() * 40);
  starPos.push(v.x, v.y, v.z);
}
starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
  color: 0xff5555,
  size: 0.025,
  transparent: true,
  opacity: 0.35,
  blending: THREE.AdditiveBlending
})));

/* 灯光 */
scene.add(new THREE.AmbientLight(0xff2222, 0.9));
const light = new THREE.PointLight(0xff3333, 9, 20);
light.position.set(4, 3, 6);
scene.add(light);

/* 攻击线系统 */
const attacks = [];
const cities = [
  { name: "Beijing", lat: 39.9, lon: 116.4 },
  { name: "Tokyo", lat: 35.6, lon: 139.7 },
  { name: "Moscow", lat: 55.7, lon: 37.6 },
  { name: "Berlin", lat: 52.5, lon: 13.4 },
  { name: "Paris", lat: 48.8, lon: 2.3 },
  { name: "London", lat: 51.5, lon: -0.1 },
  { name: "New York", lat: 40.7, lon: -74 },
  { name: "Los Angeles", lat: 34.0, lon: -118.2 },
  { name: "São Paulo", lat: -23.5, lon: -46.6 },
  { name: "Singapore", lat: 1.35, lon: 103.8 },
  { name: "Sydney", lat: -33.8, lon: 151.2 },
  { name: "Dubai", lat: 25.2, lon: 55.2 }
];

function createAttack() {
  const a = cities[Math.floor(Math.random() * cities.length)];
  let b = cities[Math.floor(Math.random() * cities.length)];
  if (a === b) b = cities[(cities.indexOf(a) + 3) % cities.length];

  const start = latLonToVec3(a.lat, a.lon, R * 1.03);
  const end = latLonToVec3(b.lat, b.lon, R * 1.03);
  const mid = start.clone().add(end).normalize().multiplyScalar(R * rand(1.55, 1.95));

  const curve = new THREE.CatmullRomCurve3([start, mid, end]);
  const points = curve.getPoints(96);

  const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
  const lineMat = new THREE.LineBasicMaterial({
    color: 0xff1d1d,
    transparent: true,
    opacity: 0.25,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const line = new THREE.Line(lineGeo, lineMat);
  globeGroup.add(line);

  const headGeo = new THREE.SphereGeometry(0.045, 16, 16);
  const headMat = new THREE.MeshBasicMaterial({
    color: 0xfff0f0,
    transparent: true,
    opacity: 1,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const head = new THREE.Mesh(headGeo, headMat);
  globeGroup.add(head);

  const tailGeo = new THREE.BufferGeometry();
  const tailMat = new THREE.LineBasicMaterial({
    color: 0xff4444,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const tail = new THREE.Line(tailGeo, tailMat);
  globeGroup.add(tail);

  attacks.push({
    line, head, tail, curve,
    progress: 0,
    speed: rand(0.004, 0.011),
    from: a.name,
    to: b.name,
    done: false
  });

  addLog(`${a.name} → ${b.name}`);
}

function createRing(position) {
  const ringGeo = new THREE.RingGeometry(0.035, 0.042, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff3535,
    transparent: true,
    opacity: 1,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(position.clone().normalize().multiplyScalar(R * 1.036));
  ring.lookAt(position.clone().multiplyScalar(2));
  globeGroup.add(ring);

  rings.push({
    mesh: ring,
    scale: 0.3,
    life: 1
  });
}

const rings = [];

function updateAttacks() {
  for (let i = attacks.length - 1; i >= 0; i--) {
    const a = attacks[i];
    a.progress += a.speed;

    const p = a.curve.getPoint(Math.min(a.progress, 1));
    a.head.position.copy(p);

    const tailPoints = [];
    const tailLength = 0.1;
    for (let t = Math.max(0, a.progress - tailLength); t <= a.progress; t += 0.012) {
      tailPoints.push(a.curve.getPoint(Math.min(t, 1)));
    }
    a.tail.geometry.dispose();
    a.tail.geometry = new THREE.BufferGeometry().setFromPoints(tailPoints);

    a.line.material.opacity = Math.max(0, 0.25 * (1 - a.progress));

    if (a.progress >= 1 && !a.done) {
      a.done = true;
      createRing(a.curve.getPoint(1));
    }

    if (a.progress > 1.15) {
      globeGroup.remove(a.line, a.head, a.tail);
      a.line.geometry.dispose();
      a.head.geometry.dispose();
      a.tail.geometry.dispose();
      attacks.splice(i, 1);
    }
  }
}

function updateRings() {
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    r.scale += 0.045;
    r.life -= 0.018;
    r.mesh.scale.setScalar(r.scale);
    r.mesh.material.opacity = Math.max(0, r.life);

    if (r.life <= 0) {
      globeGroup.remove(r.mesh);
      r.mesh.geometry.dispose();
      r.mesh.material.dispose();
      rings.splice(i, 1);
    }
  }
}

function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;

  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function addLog(text) {
  const left = document.getElementById("logLeft");
  const right = document.getElementById("logRight");
  const time = new Date().toLocaleTimeString();

  left.innerHTML = `[${time}] ${text}<br>` + left.innerHTML;
  right.innerHTML = `[TRACE] ${text}<br>` + right.innerHTML;

  left.innerHTML = left.innerHTML.split("<br>").slice(0, 9).join("<br>");
  right.innerHTML = right.innerHTML.split("<br>").slice(0, 9).join("<br>");
}

setInterval(() => {
  createAttack();
  document.getElementById("s1").textContent = 1200 + Math.floor(Math.random() * 300);
  document.getElementById("s2").textContent = 800 + Math.floor(Math.random() * 200);
  document.getElementById("s3").textContent = 400 + Math.floor(Math.random() * 160);
  document.getElementById("s4").textContent = 900 + Math.floor(Math.random() * 260);
}, 420);

for (let i = 0; i < 10; i++) {
  setTimeout(createAttack, i * 220);
}

function animate() {
  requestAnimationFrame(animate);

  globeGroup.rotation.y += 0.0008;
  halo.rotation.y -= 0.0015;
  dots.rotation.y += 0.0004;

  updateAttacks();
  updateRings();
  controls.update();
  composer.render();
}

animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
