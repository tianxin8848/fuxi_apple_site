<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Three.js 彗星攻击线 Demo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #190006 0%, #030305 70%);
    }

    #info {
      position: fixed;
      top: 16px;
      left: 20px;
      color: #ff6b7a;
      font-family: Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      z-index: 10;
      text-shadow: 0 0 10px #ff0033;
    }
  </style>
</head>
<body>
<div id="info">Three.js Comet Attack Arc Demo</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
<script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/addons/controls/OrbitControls.js";
  import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
  import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
  import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  camera.position.set(0, 1.8, 5);

  const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  /**
   * 地球
   */
  const globe = new THREE.Mesh(
    new THREE.SphereGeometry(1.35, 96, 96),
    new THREE.MeshStandardMaterial({
      color: new THREE.Color("#3a0008"),
      roughness: 0.75,
      metalness: 0.15,
      emissive: new THREE.Color("#120004"),
      emissiveIntensity: 0.6
    })
  );
  scene.add(globe);

  /**
   * 球体边缘线框
   */
  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(1.355, 48, 48),
    new THREE.MeshBasicMaterial({
      color: "#ff1b3d",
      wireframe: true,
      transparent: true,
      opacity: 0.08
    })
  );
  scene.add(wire);

  /**
   * 光源
   */
  scene.add(new THREE.AmbientLight("#ff8899", 0.6));

  const pointLight = new THREE.PointLight("#ff0033", 4, 10);
  pointLight.position.set(3, 3, 4);
  scene.add(pointLight);

  /**
   * 经纬度转 3D 坐标
   */
  function latLngToVec3(lat, lng, radius = 1.42) {
    const phi = (90 - lat) * Math.PI / 180;
    const theta = (lng + 180) * Math.PI / 180;

    return new THREE.Vector3(
      -radius * Math.sin(phi) * Math.cos(theta),
       radius * Math.cos(phi),
       radius * Math.sin(phi) * Math.sin(theta)
    );
  }

  /**
   * 创建弧线曲线
   */
  function createArcCurve(startLat, startLng, endLat, endLng) {
    const start = latLngToVec3(startLat, startLng);
    const end = latLngToVec3(endLat, endLng);

    const mid = start.clone().add(end).multiplyScalar(0.5);
    mid.normalize().multiplyScalar(2.25);

    return new THREE.CatmullRomCurve3([
      start,
      mid,
      end
    ]);
  }

  /**
   * 创建彗星攻击线
   */
  function createCometArc(curve, color = "#ff2244") {
    const geometry = new THREE.TubeGeometry(curve, 160, 0.012, 8, false);

    const material = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: Math.random() },
        uColor: { value: new THREE.Color(color) },
        uTailLength: { value: 0.22 }
      },
      vertexShader: `
        varying float vProgress;

        void main() {
          vProgress = uv.x;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform vec3 uColor;
        uniform float uTailLength;
        varying float vProgress;

        void main() {
          float head = fract(uTime);
          float d = head - vProgress;

          if (d < 0.0) {
            d += 1.0;
          }

          float tail = smoothstep(uTailLength, 0.0, d);
          float headGlow = smoothstep(0.03, 0.0, abs(d));

          float alpha = tail * 0.85 + headGlow * 1.5;

          vec3 finalColor = mix(uColor, vec3(1.0, 0.82, 0.82), headGlow);

          gl_FragColor = vec4(finalColor, alpha);
        }
      `
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    return material;
  }

  /**
   * 攻击点亮球
   */
  function createCometHead(curve) {
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.045, 24, 24),
      new THREE.MeshBasicMaterial({
        color: "#ffe8e8",
        transparent: true,
        opacity: 1,
        blending: THREE.AdditiveBlending
      })
    );

    scene.add(head);

    return {
      mesh: head,
      curve,
      progress: Math.random()
    };
  }

  const curves = [
    createArcCurve(35, 105, 40, -74),
    createArcCurve(51, 0, 35, 139),
    createArcCurve(-23, -46, 55, 37),
    createArcCurve(1, 103, 48, 2),
    createArcCurve(28, 77, -33, 151)
  ];

  const cometMaterials = [];
  const cometHeads = [];

  curves.forEach((curve) => {
    cometMaterials.push(createCometArc(curve, "#ff1e3c"));
    cometHeads.push(createCometHead(curve));
  });

  /**
   * Bloom 后期发光
   */
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));

  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.8,
    0.45,
    0.1
  );
  composer.addPass(bloomPass);

  /**
   * 动画
   */
  function animate() {
    requestAnimationFrame(animate);

    globe.rotation.y += 0.0015;
    wire.rotation.y += 0.0015;

    cometMaterials.forEach((mat, index) => {
      mat.uniforms.uTime.value += 0.004 + index * 0.0005;
    });

    cometHeads.forEach((item, index) => {
      item.progress += 0.004 + index * 0.0005;
      item.progress %= 1;

      const pos = item.curve.getPointAt(item.progress);
      item.mesh.position.copy(pos);

      const s = 1 + Math.sin(Date.now() * 0.015 + index) * 0.25;
      item.mesh.scale.setScalar(s);
    });

    controls.update();
    composer.render();
  }

  animate();

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
