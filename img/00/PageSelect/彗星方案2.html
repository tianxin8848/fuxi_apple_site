<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 光带轨迹线验证</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #030303;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #panel {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 260px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #e8e8e8;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    #panel h3 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .row {
      margin-bottom: 8px;
      font-size: 12px;
    }
    .row label {
      display: block;
      margin-bottom: 4px;
      opacity: 0.9;
    }
    .row input {
      width: 100%;
      cursor: pointer;
    }
    .tips {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.4;
      opacity: 0.8;
    }
    .legend {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px 8px;
      font-size: 11px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      display: inline-block;
      box-shadow: 0 0 8px currentColor;
    }
    .preset-btn {
      width: 100%;
      margin-top: 4px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: #f3f3f3;
      cursor: pointer;
      font-size: 12px;
    }
    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="panel">
    <h3>光带参数（全局）</h3>
    <div class="row">
      <label for="maxWidth">maxWidth: <span id="maxWidthValue"></span></label>
      <input id="maxWidth" type="range" min="0.12" max="1.2" step="0.01" value="0.45" />
    </div>
    <div class="row">
      <label for="brightness">brightness: <span id="brightnessValue"></span></label>
      <input id="brightness" type="range" min="0.5" max="5.0" step="0.05" value="2.1" />
    </div>
    <div class="row">
      <label for="travelTime">travelTime(s): <span id="travelTimeValue"></span></label>
      <input id="travelTime" type="range" min="0.4" max="4.0" step="0.1" value="1.5" />
    </div>
    <div class="row">
      <label for="pulseSpeed">pulseSpeed: <span id="pulseSpeedValue"></span></label>
      <input id="pulseSpeed" type="range" min="0.4" max="3.0" step="0.1" value="1.0" />
    </div>
    <div class="row">
      <label for="pulseHeight">pulseHeight: <span id="pulseHeightValue"></span></label>
      <input id="pulseHeight" type="range" min="0.8" max="8.0" step="0.1" value="3.2" />
    </div>
    <div class="row">
      <label for="pulseFrequency">pulseFrequency: <span id="pulseFrequencyValue"></span></label>
      <input id="pulseFrequency" type="range" min="0.2" max="3.0" step="0.1" value="0.9" />
    </div>
    <div class="row">
      <label for="gridCount">gridCount: <span id="gridCountValue"></span></label>
      <input id="gridCount" type="range" min="2" max="12" step="1" value="6" />
    </div>
    <div class="row">
      <label for="gridSize">gridSize: <span id="gridSizeValue"></span></label>
      <input id="gridSize" type="range" min="0.8" max="8.0" step="0.1" value="2.8" />
    </div>
    <div class="row">
      <label for="curveHeight">curveHeight: <span id="curveHeightValue"></span></label>
      <input id="curveHeight" type="range" min="1.0" max="12.0" step="0.1" value="5.5" />
    </div>
    <div class="row">
      <label for="segments">segments: <span id="segmentsValue"></span></label>
      <input id="segments" type="range" min="100" max="160" step="1" value="128" />
    </div>
    <div class="row">
      <label for="color">color</label>
      <input id="color" type="color" value="#ff3a1a" />
    </div>
    <div class="row">
      <button id="applyFixedPreset" class="preset-btn" type="button">应用固定参数预设</button>
    </div>
    <div class="tips">
      说明：线宽和透明度都按 sin(PI*t) 分布，保证两端尖细透明、中段更宽更亮。<br />
      你可以边调参数边看是否接近 CyberMap 风格。
    </div>
    <div class="legend">
      <div class="legend-item"><span class="swatch" style="color:#38b349;background:#38b349;"></span>OAS</div>
      <div class="legend-item"><span class="swatch" style="color:#ed1c24;background:#ed1c24;"></span>ODS</div>
      <div class="legend-item"><span class="swatch" style="color:#f26522;background:#f26522;"></span>MAV</div>
      <div class="legend-item"><span class="swatch" style="color:#0087f4;background:#0087f4;"></span>WAV</div>
      <div class="legend-item"><span class="swatch" style="color:#ec008c;background:#ec008c;"></span>IDS</div>
      <div class="legend-item"><span class="swatch" style="color:#fbf267;background:#fbf267;"></span>VUL</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

    const app = document.getElementById("app");

    const logBox = document.createElement("div");
    logBox.style.position = "absolute";
    logBox.style.left = "16px";
    logBox.style.top = "16px";
    logBox.style.maxWidth = "45vw";
    logBox.style.padding = "8px 10px";
    logBox.style.fontSize = "12px";
    logBox.style.color = "#ffb4b4";
    logBox.style.background = "rgba(60,0,0,0.45)";
    logBox.style.border = "1px solid rgba(255,120,120,0.35)";
    logBox.style.borderRadius = "8px";
    logBox.style.zIndex = "20";
    logBox.style.display = "none";
    document.body.appendChild(logBox);

    function showError(msg) {
      logBox.style.display = "block";
      logBox.textContent = `Runtime Error: ${msg}`;
    }

    window.addEventListener("error", (e) => showError(e.message || "unknown error"));
    window.addEventListener("unhandledrejection", (e) => showError(String(e.reason || "promise rejected")));

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearColor(0x020202, 1);
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 4, 22);
    camera.lookAt(0, 0, 0);

    const ambient = new THREE.AmbientLight(0x330000, 0.4);
    scene.add(ambient);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.35, 0.1);
    bloomPass.strength = 1.6;
    bloomPass.radius = 0.28;
    bloomPass.threshold = 0.02;
    composer.addPass(bloomPass);

    const ui = {
      maxWidth: document.getElementById("maxWidth"),
      brightness: document.getElementById("brightness"),
      travelTime: document.getElementById("travelTime"),
      pulseSpeed: document.getElementById("pulseSpeed"),
      pulseHeight: document.getElementById("pulseHeight"),
      pulseFrequency: document.getElementById("pulseFrequency"),
      gridCount: document.getElementById("gridCount"),
      gridSize: document.getElementById("gridSize"),
      curveHeight: document.getElementById("curveHeight"),
      segments: document.getElementById("segments"),
      color: document.getElementById("color"),
      maxWidthValue: document.getElementById("maxWidthValue"),
      brightnessValue: document.getElementById("brightnessValue"),
      travelTimeValue: document.getElementById("travelTimeValue"),
      pulseSpeedValue: document.getElementById("pulseSpeedValue"),
      pulseHeightValue: document.getElementById("pulseHeightValue"),
      pulseFrequencyValue: document.getElementById("pulseFrequencyValue"),
      gridCountValue: document.getElementById("gridCountValue"),
      gridSizeValue: document.getElementById("gridSizeValue"),
      curveHeightValue: document.getElementById("curveHeightValue"),
      segmentsValue: document.getElementById("segmentsValue"),
      applyFixedPreset: document.getElementById("applyFixedPreset"),
    };

    const detectionTypeColors = {
      1: "#38b349", // OAS
      2: "#ed1c24", // ODS
      3: "#f26522", // MAV
      4: "#0087f4", // WAV
      5: "#ec008c", // IDS
      6: "#fbf267", // VUL
    };

    const basePresets = [
      {
        detectionType: 1,
        start: new THREE.Vector3(-9, -2.4, -2),
        end: new THREE.Vector3(9.5, 2.0, 1.5),
        sideOffset: new THREE.Vector3(0, 0, 1.2),
        widthScale: 1.0,
        heightScale: 1.0,
        phase: 0.0,
        trail: 0.24,
      },
      {
        detectionType: 2,
        start: new THREE.Vector3(-11, 1.4, 1.3),
        end: new THREE.Vector3(7.8, -1.2, -0.8),
        sideOffset: new THREE.Vector3(0, 0, -1.5),
        widthScale: 0.75,
        heightScale: 0.8,
        phase: 0.33,
        trail: 0.2,
      },
      {
        detectionType: 3,
        start: new THREE.Vector3(-8, 3.4, -1.0),
        end: new THREE.Vector3(10.8, -3.3, 0.3),
        sideOffset: new THREE.Vector3(0, 0, 1.0),
        widthScale: 1.35,
        heightScale: 1.2,
        phase: 0.66,
        trail: 0.28,
      },
      {
        detectionType: 4,
        start: new THREE.Vector3(-10.5, 0.1, -3.2),
        end: new THREE.Vector3(8.8, 3.7, -1.2),
        sideOffset: new THREE.Vector3(0, 0, 1.7),
        widthScale: 0.95,
        heightScale: 1.15,
        phase: 0.12,
        trail: 0.21,
      },
      {
        detectionType: 5,
        start: new THREE.Vector3(-6.7, -3.5, 1.8),
        end: new THREE.Vector3(10.4, 1.8, -2.2),
        sideOffset: new THREE.Vector3(0, 0, -1.4),
        widthScale: 1.1,
        heightScale: 0.9,
        phase: 0.45,
        trail: 0.24,
      },
      {
        detectionType: 6,
        start: new THREE.Vector3(-10.8, 2.8, 2.6),
        end: new THREE.Vector3(6.9, -2.5, 2.2),
        sideOffset: new THREE.Vector3(0, 0, 1.1),
        widthScale: 0.7,
        heightScale: 0.75,
        phase: 0.78,
        trail: 0.19,
      },
    ];

    const ribbons = [];
    const endpointMarkers = [];
    const aPulseSystems = [];
    const aGroundGridSystems = [];

    // =========================
    // 轨迹渲染 Shader（轨迹 + 彗星透明基础）
    // - aProgress: 顶点在整条轨迹中的进度 [0,1]
    // - vAlpha: 使用 sin(PI*t) 让轨迹两端透明、中间更亮
    // =========================
    const vertexShader = `
      attribute float aProgress;
      varying float vProgress;
      varying float vAlpha;
      void main() {
        vProgress = aProgress;
        vAlpha = sin(3.14159265 * aProgress);
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    // =========================
    // 彗星头部 + 拖尾核心实现（在轨迹带上移动）
    // - uHead: 当前彗星头部在轨迹上的位置进度
    // - uTrail: 拖尾长度
    // - trailMask + headGlow: 组合成“头亮尾衰减”的彗星视觉
    // =========================
    const fragmentShader = `
      uniform vec3 uColor;
      uniform float uBrightness;
      uniform float uHead;
      uniform float uTrail;
      varying float vProgress;
      varying float vAlpha;
      void main() {
        float centerBoost = pow(sin(3.14159265 * vProgress), 1.45);
        float alphaProfile = clamp(vAlpha, 0.0, 1.0);
        float trailDist = uHead - vProgress;
        if (trailDist < 0.0) trailDist += 1.0;
        float trailMask = 1.0 - smoothstep(0.0, uTrail, trailDist);
        float headGlow = exp(-trailDist * 24.0);
        float alpha = alphaProfile * max(trailMask, headGlow * 0.95);
        vec3 color = uColor * (0.35 + uBrightness * (centerBoost * trailMask + headGlow));
        gl_FragColor = vec4(color, alpha);
      }
    `;

    function formatValue(value, digits = 2) {
      return Number(value).toFixed(digits);
    }

    function updateLabels() {
      ui.maxWidthValue.textContent = formatValue(ui.maxWidth.value, 2);
      ui.brightnessValue.textContent = formatValue(ui.brightness.value, 2);
      ui.travelTimeValue.textContent = `${formatValue(ui.travelTime.value, 1)}s`;
      ui.pulseSpeedValue.textContent = `${formatValue(ui.pulseSpeed.value, 1)}x`;
      ui.pulseHeightValue.textContent = formatValue(ui.pulseHeight.value, 1);
      ui.pulseFrequencyValue.textContent = `${formatValue(ui.pulseFrequency.value, 1)}Hz`;
      ui.gridCountValue.textContent = String(ui.gridCount.value);
      ui.gridSizeValue.textContent = formatValue(ui.gridSize.value, 1);
      ui.curveHeightValue.textContent = formatValue(ui.curveHeight.value, 1);
      ui.segmentsValue.textContent = String(ui.segments.value);
    }

    function buildCurve(start, end, height, sideOffset) {
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const up = new THREE.Vector3(0, 1, 0);
      const dir = new THREE.Vector3().subVectors(end, start).normalize();
      const side = new THREE.Vector3().crossVectors(dir, up).normalize();

      const controlA = start.clone()
        .lerp(mid, 0.5)
        .add(up.clone().multiplyScalar(height))
        .add(side.clone().multiplyScalar(sideOffset.z))
        .add(sideOffset.clone().setY(sideOffset.y).setZ(0));

      const controlB = end.clone()
        .lerp(mid, 0.5)
        .add(up.clone().multiplyScalar(height * 0.8))
        .add(side.clone().multiplyScalar(-sideOffset.z))
        .add(sideOffset.clone().setY(sideOffset.y).setZ(0));

      return new THREE.CubicBezierCurve3(start.clone(), controlA, controlB, end.clone());
    }

    // =========================
    // 轨迹几何核心实现（不是 THREE.Line）
    // 手动构建 BufferGeometry 带状网格：
    // 1) 沿曲线采样 points
    // 2) 每个采样点生成 left/right 两个顶点
    // 3) 相邻采样点拼接成两个三角形
    // 4) width = maxWidth * sin(PI*t)
    // =========================
    function createRibbonGeometry(curve, segments, maxWidth) {
      const points = curve.getPoints(segments);
      const vertCount = points.length * 2;
      const positions = new Float32Array(vertCount * 3);
      const progress = new Float32Array(vertCount);
      const indices = [];

      const up = new THREE.Vector3(0, 1, 0);
      const fallback = new THREE.Vector3(0, 0, 1);

      for (let i = 0; i < points.length; i++) {
        const t = i / (points.length - 1);
        const p = points[i];

        const tangent = curve.getTangent(Math.min(1, Math.max(0, t))).normalize();
        let side = new THREE.Vector3().crossVectors(up, tangent).normalize();
        if (side.lengthSq() < 1e-6) {
          side = new THREE.Vector3().crossVectors(fallback, tangent).normalize();
        }

        // width = maxWidth * sin(PI*t): 两头细，中间宽
        const width = maxWidth * Math.sin(Math.PI * t);
        const left = p.clone().addScaledVector(side, width);
        const right = p.clone().addScaledVector(side, -width);

        const li = i * 2;
        const ri = i * 2 + 1;

        positions[li * 3 + 0] = left.x;
        positions[li * 3 + 1] = left.y;
        positions[li * 3 + 2] = left.z;
        positions[ri * 3 + 0] = right.x;
        positions[ri * 3 + 1] = right.y;
        positions[ri * 3 + 2] = right.z;

        progress[li] = t;
        progress[ri] = t;

        if (i < points.length - 1) {
          const nli = (i + 1) * 2;
          const nri = (i + 1) * 2 + 1;
          indices.push(li, ri, nli);
          indices.push(ri, nri, nli);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("aProgress", new THREE.BufferAttribute(progress, 1));
      geometry.setIndex(indices);
      geometry.computeBoundingSphere();
      return geometry;
    }

    // 轨迹 Mesh 组装：把“轨迹几何 + 彗星Shader材质”组合在一起
    function createRibbonMesh({ start, end, sideOffset, widthScale, heightScale, phase, trail, detectionType }) {
      const segments = Number(ui.segments.value);
      const maxWidth = Number(ui.maxWidth.value) * widthScale;
      const curveHeight = Number(ui.curveHeight.value) * heightScale;
      const colorHex = detectionTypeColors[detectionType] || ui.color.value;
      const color = new THREE.Color(colorHex);
      const brightness = Number(ui.brightness.value);

      const curve = buildCurve(start, end, curveHeight, sideOffset);
      const geometry = createRibbonGeometry(curve, segments, maxWidth);
      const material = new THREE.ShaderMaterial({
        uniforms: {
          uColor: { value: color },
          uBrightness: { value: brightness },
          uHead: { value: 0.0 },
          uTrail: { value: trail ?? 0.22 },
        },
        vertexShader,
        fragmentShader,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.userData.phase = phase ?? 0.0;
      mesh.userData.detectionType = detectionType;
      return mesh;
    }

    // =========================
    // 点位标签实现（A / B 字母）
    // =========================
    function createTextSprite(text, color = "#ffffff") {
      const canvas = document.createElement("canvas");
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = "bold 64px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.fillText(text, 64, 64);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.8, 0.8, 0.8);
      return sprite;
    }

    // =========================
    // 点位实现（A/B 点）
    // - 核心小球 + 发光环 + 文本标签
    // =========================
    function createEndpointMarker(position, label, colorHex) {
      const group = new THREE.Group();

      const coreGeo = new THREE.SphereGeometry(0.16, 16, 16);
      const coreMat = new THREE.MeshBasicMaterial({ color: colorHex });
      const core = new THREE.Mesh(coreGeo, coreMat);
      group.add(core);

      const ringGeo = new THREE.RingGeometry(0.24, 0.34, 24);
      const ringMat = new THREE.MeshBasicMaterial({
        color: colorHex,
        transparent: true,
        opacity: 0.55,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI * 0.5;
      group.add(ring);

      const text = createTextSprite(label, colorHex);
      text.position.set(0, 0.75, 0);
      group.add(text);

      group.position.copy(position);
      return group;
    }

    // A点“分层三角光圈”几何：细线轮廓（外三角 + 内三角），不是面光带
    function createTriangleLoopGeometry(radius = 0.55) {
      const points = [];
      const steps = 3;
      for (let i = 0; i < steps; i++) {
        const a = (i / steps) * Math.PI * 2 - Math.PI / 2;
        points.push(new THREE.Vector3(Math.cos(a) * radius, Math.sin(a) * radius, 0));
      }
      return new THREE.BufferGeometry().setFromPoints(points);
    }

    function createTriangularRingLines(outerRadius, innerRadius, colorHex) {
      const lineMat = new THREE.LineBasicMaterial({
        color: colorHex,
        transparent: true,
        opacity: 0.0,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const innerMat = lineMat.clone();

      const outerLine = new THREE.LineLoop(createTriangleLoopGeometry(outerRadius), lineMat);
      const innerLine = new THREE.LineLoop(createTriangleLoopGeometry(innerRadius), innerMat);

      const ringGroup = new THREE.Group();
      ringGroup.add(outerLine, innerLine);
      ringGroup.userData.materials = [lineMat, innerMat];
      return ringGroup;
    }

    // A点特效实现：向上(Y轴)喷射的分层三角脉冲系统
    function createAPulseSystem(position, primaryColorHex = "#ff4d3d") {
      const group = new THREE.Group();
      group.position.copy(position);
      group.position.y += 0.03;

      const pulseLayers = [];
      const layerCount = 6;

      for (let i = 0; i < layerCount; i++) {
        const isBlue = i % 2 === 1;
        const color = isBlue ? 0x4aa3ff : new THREE.Color(primaryColorHex).getHex();
        const ring = createTriangularRingLines(0.55, 0.36, color);
        ring.scale.setScalar(0.35);
        ring.rotation.x = -Math.PI * 0.5;
        ring.rotation.z = i * 0.55;
        group.add(ring);

        pulseLayers.push({
          mesh: ring,
          offset: i / layerCount,
          spin: (isBlue ? -1 : 1) * (0.35 + i * 0.05),
        });
      }

      return { group, pulseLayers };
    }

    // A点底部特效：地面网格脉冲（围绕点扩散）
    function createAGroundGridSystem(position, primaryColorHex = "#ff4d3d", count = 6, size = 2.8) {
      const group = new THREE.Group();
      group.position.copy(position);
      group.position.y -= 0.02;

      const gridLayers = [];
      const layerCount = Math.max(1, Math.floor(count));
      const baseSize = Math.max(0.3, size);

      for (let i = 0; i < layerCount; i++) {
        const grid = new THREE.GridHelper(baseSize, 6, new THREE.Color(primaryColorHex), new THREE.Color(primaryColorHex));
        grid.material.transparent = true;
        grid.material.opacity = 0.0;
        grid.material.depthWrite = false;
        grid.material.blending = THREE.AdditiveBlending;
        grid.rotation.y = i * 0.34;
        group.add(grid);

        gridLayers.push({
          mesh: grid,
          offset: i / layerCount,
          spin: (i % 2 === 0 ? 1 : -1) * (0.002 + i * 0.00025),
        });
      }

      return { group, gridLayers, baseSize };
    }

    // 场景重建：轨迹、A/B点、A点脉冲都在这里统一创建/销毁
    function rebuildRibbons() {
      for (const ribbon of ribbons) {
        ribbon.geometry.dispose();
        ribbon.material.dispose();
        scene.remove(ribbon);
      }
      ribbons.length = 0;
      for (const marker of endpointMarkers) {
        scene.remove(marker);
      }
      endpointMarkers.length = 0;
      for (const pulseSystem of aPulseSystems) {
        scene.remove(pulseSystem.group);
      }
      aPulseSystems.length = 0;
      for (const gridSystem of aGroundGridSystems) {
        scene.remove(gridSystem.group);
      }
      aGroundGridSystems.length = 0;

      for (const preset of basePresets) {
        const mesh = createRibbonMesh(preset);
        ribbons.push(mesh);
        scene.add(mesh);

        const markerColor = detectionTypeColors[preset.detectionType] || "#ff8844";
        const aMarker = createEndpointMarker(preset.start, "A", markerColor);
        const bMarker = createEndpointMarker(preset.end, "B", markerColor);
        endpointMarkers.push(aMarker, bMarker);
        scene.add(aMarker, bMarker);

        const pulse = createAPulseSystem(preset.start, markerColor);
        aPulseSystems.push(pulse);
        scene.add(pulse.group);

        const groundGrid = createAGroundGridSystem(
          preset.start,
          markerColor,
          Number(ui.gridCount.value),
          Number(ui.gridSize.value),
        );
        aGroundGridSystems.push(groundGrid);
        scene.add(groundGrid.group);
      }
    }

    function onControlChange() {
      updateLabels();
      rebuildRibbons();
    }

    function applyFixedPresetValues() {
      ui.maxWidth.value = "0.45";
      ui.brightness.value = "2.10";
      ui.travelTime.value = "1.0";
      ui.pulseHeight.value = "1.6";
      ui.pulseFrequency.value = "0.5";
      ui.gridCount.value = "2";
      ui.gridSize.value = "0.8";
      ui.curveHeight.value = "4.8";
      ui.segments.value = "120";
      onControlChange();
    }

    for (const key of ["maxWidth", "brightness", "travelTime", "pulseSpeed", "pulseHeight", "pulseFrequency", "gridCount", "gridSize", "curveHeight", "segments", "color"]) {
      ui[key].addEventListener("input", onControlChange);
    }
    ui.applyFixedPreset.addEventListener("click", applyFixedPresetValues);

    onControlChange();

    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now() * 0.001;

      // =========================
      // 彗星运动实现（A -> B）
      // 通过更新 uHead，让“亮头 + 拖尾”沿轨迹前进
      // =========================
      const travelTime = Math.max(0.1, Number(ui.travelTime.value));
      for (const ribbon of ribbons) {
        const head = ((time / travelTime) + ribbon.userData.phase) % 1;
        ribbon.material.uniforms.uHead.value = head;
        ribbon.material.uniforms.uBrightness.value = Number(ui.brightness.value) * (0.92 + 0.12 * Math.sin(time * 2.0));
      }

      // =========================
      // A点脉冲动画（沿Y轴上升，越高越大）
      // =========================
      for (const pulse of aPulseSystems) {
        const pulseFrequency = Number(ui.pulseFrequency.value);
        const pulseSpeed = Number(ui.pulseSpeed.value);
        const pulseHeight = Number(ui.pulseHeight.value);
        for (const layer of pulse.pulseLayers) {
          const life = (time * pulseFrequency + layer.offset) % 1;
          // 沿世界 Y 轴向上发射：越高光圈越大
          const yOffset = life * pulseHeight * pulseSpeed;
          const scale = 0.28 + yOffset * 0.85;
          const alpha = Math.pow(1.0 - life, 1.7) * 0.9;
          layer.mesh.position.y = yOffset;
          layer.mesh.scale.setScalar(scale);
          for (const mat of layer.mesh.userData.materials) {
            mat.opacity = alpha;
          }
          layer.mesh.rotation.z += 0.004 * layer.spin;
        }
      }

      // A点底部网格脉冲动画：向外扩张并逐步衰减
      for (const gridSystem of aGroundGridSystems) {
        const pulseFrequency = Number(ui.pulseFrequency.value);
        for (const layer of gridSystem.gridLayers) {
          const life = (time * pulseFrequency + layer.offset) % 1;
          const scale = 0.25 + life * 1.9;
          const alpha = Math.pow(1.0 - life, 2.0) * 0.75;
          layer.mesh.scale.setScalar(scale);
          layer.mesh.material.opacity = alpha;
          layer.mesh.rotation.y += layer.spin;
        }
      }

      composer.render();
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloomPass.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
