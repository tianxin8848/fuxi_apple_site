<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 光带轨迹线验证</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #030303;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #panel {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 260px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #e8e8e8;
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    #panel h3 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .row {
      margin-bottom: 8px;
      font-size: 12px;
    }
    .row label {
      display: block;
      margin-bottom: 4px;
      opacity: 0.9;
    }
    .row input {
      width: 100%;
      cursor: pointer;
    }
    .tips {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.4;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="panel">
    <h3>光带参数（全局）</h3>
    <div class="row">
      <label for="maxWidth">maxWidth: <span id="maxWidthValue"></span></label>
      <input id="maxWidth" type="range" min="0.12" max="1.2" step="0.01" value="0.45" />
    </div>
    <div class="row">
      <label for="brightness">brightness: <span id="brightnessValue"></span></label>
      <input id="brightness" type="range" min="0.5" max="5.0" step="0.05" value="2.1" />
    </div>
    <div class="row">
      <label for="travelTime">travelTime(s): <span id="travelTimeValue"></span></label>
      <input id="travelTime" type="range" min="0.4" max="4.0" step="0.1" value="1.5" />
    </div>
    <div class="row">
      <label for="curveHeight">curveHeight: <span id="curveHeightValue"></span></label>
      <input id="curveHeight" type="range" min="1.0" max="12.0" step="0.1" value="5.5" />
    </div>
    <div class="row">
      <label for="segments">segments: <span id="segmentsValue"></span></label>
      <input id="segments" type="range" min="100" max="160" step="1" value="128" />
    </div>
    <div class="row">
      <label for="color">color</label>
      <input id="color" type="color" value="#ff3a1a" />
    </div>
    <div class="tips">
      说明：线宽和透明度都按 sin(PI*t) 分布，保证两端尖细透明、中段更宽更亮。<br />
      你可以边调参数边看是否接近 CyberMap 风格。
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

    const app = document.getElementById("app");

    const logBox = document.createElement("div");
    logBox.style.position = "absolute";
    logBox.style.left = "16px";
    logBox.style.top = "16px";
    logBox.style.maxWidth = "45vw";
    logBox.style.padding = "8px 10px";
    logBox.style.fontSize = "12px";
    logBox.style.color = "#ffb4b4";
    logBox.style.background = "rgba(60,0,0,0.45)";
    logBox.style.border = "1px solid rgba(255,120,120,0.35)";
    logBox.style.borderRadius = "8px";
    logBox.style.zIndex = "20";
    logBox.style.display = "none";
    document.body.appendChild(logBox);

    function showError(msg) {
      logBox.style.display = "block";
      logBox.textContent = `Runtime Error: ${msg}`;
    }

    window.addEventListener("error", (e) => showError(e.message || "unknown error"));
    window.addEventListener("unhandledrejection", (e) => showError(String(e.reason || "promise rejected")));

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearColor(0x020202, 1);
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 4, 22);
    camera.lookAt(0, 0, 0);

    const ambient = new THREE.AmbientLight(0x330000, 0.4);
    scene.add(ambient);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.35, 0.1);
    bloomPass.strength = 1.6;
    bloomPass.radius = 0.28;
    bloomPass.threshold = 0.02;
    composer.addPass(bloomPass);

    const ui = {
      maxWidth: document.getElementById("maxWidth"),
      brightness: document.getElementById("brightness"),
      travelTime: document.getElementById("travelTime"),
      curveHeight: document.getElementById("curveHeight"),
      segments: document.getElementById("segments"),
      color: document.getElementById("color"),
      maxWidthValue: document.getElementById("maxWidthValue"),
      brightnessValue: document.getElementById("brightnessValue"),
      travelTimeValue: document.getElementById("travelTimeValue"),
      curveHeightValue: document.getElementById("curveHeightValue"),
      segmentsValue: document.getElementById("segmentsValue"),
    };

    const basePresets = [
      {
        start: new THREE.Vector3(-9, -2.4, -2),
        end: new THREE.Vector3(9.5, 2.0, 1.5),
        sideOffset: new THREE.Vector3(0, 0, 1.2),
        widthScale: 1.0,
        heightScale: 1.0,
        speed: 0.15,
        phase: 0.0,
        trail: 0.24,
      },
      {
        start: new THREE.Vector3(-11, 1.4, 1.3),
        end: new THREE.Vector3(7.8, -1.2, -0.8),
        sideOffset: new THREE.Vector3(0, 0, -1.5),
        widthScale: 0.75,
        heightScale: 0.8,
        speed: 0.2,
        phase: 0.33,
        trail: 0.2,
      },
      {
        start: new THREE.Vector3(-8, 3.4, -1.0),
        end: new THREE.Vector3(10.8, -3.3, 0.3),
        sideOffset: new THREE.Vector3(0, 0, 1.0),
        widthScale: 1.35,
        heightScale: 1.2,
        speed: 0.12,
        phase: 0.66,
        trail: 0.28,
      },
    ];

    const ribbons = [];
    const endpointMarkers = [];

    const vertexShader = `
      attribute float aProgress;
      varying float vProgress;
      varying float vAlpha;
      void main() {
        vProgress = aProgress;
        vAlpha = sin(3.14159265 * aProgress);
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;

    const fragmentShader = `
      uniform vec3 uColor;
      uniform float uBrightness;
      uniform float uHead;
      uniform float uTrail;
      varying float vProgress;
      varying float vAlpha;
      void main() {
        float centerBoost = pow(sin(3.14159265 * vProgress), 1.45);
        float alphaProfile = clamp(vAlpha, 0.0, 1.0);
        float trailDist = uHead - vProgress;
        if (trailDist < 0.0) trailDist += 1.0;
        float trailMask = 1.0 - smoothstep(0.0, uTrail, trailDist);
        float headGlow = exp(-trailDist * 24.0);
        float alpha = alphaProfile * max(trailMask, headGlow * 0.95);
        vec3 color = uColor * (0.35 + uBrightness * (centerBoost * trailMask + headGlow));
        gl_FragColor = vec4(color, alpha);
      }
    `;

    function formatValue(value, digits = 2) {
      return Number(value).toFixed(digits);
    }

    function updateLabels() {
      ui.maxWidthValue.textContent = formatValue(ui.maxWidth.value, 2);
      ui.brightnessValue.textContent = formatValue(ui.brightness.value, 2);
      ui.travelTimeValue.textContent = `${formatValue(ui.travelTime.value, 1)}s`;
      ui.curveHeightValue.textContent = formatValue(ui.curveHeight.value, 1);
      ui.segmentsValue.textContent = String(ui.segments.value);
    }

    function buildCurve(start, end, height, sideOffset) {
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const up = new THREE.Vector3(0, 1, 0);
      const dir = new THREE.Vector3().subVectors(end, start).normalize();
      const side = new THREE.Vector3().crossVectors(dir, up).normalize();

      const controlA = start.clone()
        .lerp(mid, 0.5)
        .add(up.clone().multiplyScalar(height))
        .add(side.clone().multiplyScalar(sideOffset.z))
        .add(sideOffset.clone().setY(sideOffset.y).setZ(0));

      const controlB = end.clone()
        .lerp(mid, 0.5)
        .add(up.clone().multiplyScalar(height * 0.8))
        .add(side.clone().multiplyScalar(-sideOffset.z))
        .add(sideOffset.clone().setY(sideOffset.y).setZ(0));

      return new THREE.CubicBezierCurve3(start.clone(), controlA, controlB, end.clone());
    }

    function createRibbonGeometry(curve, segments, maxWidth) {
      const points = curve.getPoints(segments);
      const vertCount = points.length * 2;
      const positions = new Float32Array(vertCount * 3);
      const progress = new Float32Array(vertCount);
      const indices = [];

      const up = new THREE.Vector3(0, 1, 0);
      const fallback = new THREE.Vector3(0, 0, 1);

      for (let i = 0; i < points.length; i++) {
        const t = i / (points.length - 1);
        const p = points[i];

        const tangent = curve.getTangent(Math.min(1, Math.max(0, t))).normalize();
        let side = new THREE.Vector3().crossVectors(up, tangent).normalize();
        if (side.lengthSq() < 1e-6) {
          side = new THREE.Vector3().crossVectors(fallback, tangent).normalize();
        }

        // width = maxWidth * sin(PI*t): 两头细，中间宽
        const width = maxWidth * Math.sin(Math.PI * t);
        const left = p.clone().addScaledVector(side, width);
        const right = p.clone().addScaledVector(side, -width);

        const li = i * 2;
        const ri = i * 2 + 1;

        positions[li * 3 + 0] = left.x;
        positions[li * 3 + 1] = left.y;
        positions[li * 3 + 2] = left.z;
        positions[ri * 3 + 0] = right.x;
        positions[ri * 3 + 1] = right.y;
        positions[ri * 3 + 2] = right.z;

        progress[li] = t;
        progress[ri] = t;

        if (i < points.length - 1) {
          const nli = (i + 1) * 2;
          const nri = (i + 1) * 2 + 1;
          indices.push(li, ri, nli);
          indices.push(ri, nri, nli);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("aProgress", new THREE.BufferAttribute(progress, 1));
      geometry.setIndex(indices);
      geometry.computeBoundingSphere();
      return geometry;
    }

    function createRibbonMesh({ start, end, sideOffset, widthScale, heightScale, phase, trail }) {
      const segments = Number(ui.segments.value);
      const maxWidth = Number(ui.maxWidth.value) * widthScale;
      const curveHeight = Number(ui.curveHeight.value) * heightScale;
      const color = new THREE.Color(ui.color.value);
      const brightness = Number(ui.brightness.value);

      const curve = buildCurve(start, end, curveHeight, sideOffset);
      const geometry = createRibbonGeometry(curve, segments, maxWidth);
      const material = new THREE.ShaderMaterial({
        uniforms: {
          uColor: { value: color },
          uBrightness: { value: brightness },
          uHead: { value: 0.0 },
          uTrail: { value: trail ?? 0.22 },
        },
        vertexShader,
        fragmentShader,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.userData.phase = phase ?? 0.0;
      return mesh;
    }

    function createTextSprite(text, color = "#ffffff") {
      const canvas = document.createElement("canvas");
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = "bold 64px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.fillText(text, 64, 64);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.8, 0.8, 0.8);
      return sprite;
    }

    function createEndpointMarker(position, label, colorHex) {
      const group = new THREE.Group();

      const coreGeo = new THREE.SphereGeometry(0.16, 16, 16);
      const coreMat = new THREE.MeshBasicMaterial({ color: colorHex });
      const core = new THREE.Mesh(coreGeo, coreMat);
      group.add(core);

      const ringGeo = new THREE.RingGeometry(0.24, 0.34, 24);
      const ringMat = new THREE.MeshBasicMaterial({
        color: colorHex,
        transparent: true,
        opacity: 0.55,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI * 0.5;
      group.add(ring);

      const text = createTextSprite(label, colorHex);
      text.position.set(0, 0.75, 0);
      group.add(text);

      group.position.copy(position);
      return group;
    }

    function rebuildRibbons() {
      for (const ribbon of ribbons) {
        ribbon.geometry.dispose();
        ribbon.material.dispose();
        scene.remove(ribbon);
      }
      ribbons.length = 0;
      for (const marker of endpointMarkers) {
        scene.remove(marker);
      }
      endpointMarkers.length = 0;

      for (const preset of basePresets) {
        const mesh = createRibbonMesh(preset);
        ribbons.push(mesh);
        scene.add(mesh);

        const aMarker = createEndpointMarker(preset.start, "A", "#ff8844");
        const bMarker = createEndpointMarker(preset.end, "B", "#ffd24a");
        endpointMarkers.push(aMarker, bMarker);
        scene.add(aMarker, bMarker);
      }
    }

    function onControlChange() {
      updateLabels();
      rebuildRibbons();
    }

    for (const key of ["maxWidth", "brightness", "travelTime", "curveHeight", "segments", "color"]) {
      ui[key].addEventListener("input", onControlChange);
    }

    onControlChange();

    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now() * 0.001;

      // 每条带子独立从 A -> B 前进，形成彗星头部+拖尾
      const travelTime = Math.max(0.1, Number(ui.travelTime.value));
      for (const ribbon of ribbons) {
        const head = ((time / travelTime) + ribbon.userData.phase) % 1;
        ribbon.material.uniforms.uHead.value = head;
        ribbon.material.uniforms.uBrightness.value = Number(ui.brightness.value) * (0.92 + 0.12 * Math.sin(time * 2.0));
      }

      composer.render();
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloomPass.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
