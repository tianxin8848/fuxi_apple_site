<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 光带轨迹线验证</title>
  <link rel="stylesheet" href="./彗星方案2.css" />
</head>
<body>
  <div id="app"></div>
  <div id="panel">
    <h3>光带参数（全局）</h3>
    <div class="row">
      <label for="maxWidth">maxWidth: <span id="maxWidthValue"></span></label>
      <input id="maxWidth" type="range" min="0.12" max="1.2" step="0.01" value="0.2" />
    </div>
    <div class="row">
      <label for="brightness">brightness: <span id="brightnessValue"></span></label>
      <input id="brightness" type="range" min="0.5" max="5.0" step="0.05" value="0.5" />
    </div>
    <div class="row">
      <label for="travelTime">travelTime(s): <span id="travelTimeValue"></span></label>
      <input id="travelTime" type="range" min="0.4" max="4.0" step="0.1" value="8" />
    </div>
    <div class="row">
      <label for="pulseSpeed">pulseSpeed: <span id="pulseSpeedValue"></span></label>
      <input id="pulseSpeed" type="range" min="0.4" max="3.0" step="0.1" value="1.0" />
    </div>
    <div class="row">
      <label for="pulseHeight">pulseHeight: <span id="pulseHeightValue"></span></label>
      <input id="pulseHeight" type="range" min="0.8" max="8.0" step="0.1" value="1.6" />
    </div>
    <div class="row">
      <label for="pulseFrequency">pulseFrequency: <span id="pulseFrequencyValue"></span></label>
      <input id="pulseFrequency" type="range" min="0.2" max="3.0" step="0.1" value="0.5" />
    </div>
    <div class="row">
      <label for="gridCount">gridCount: <span id="gridCountValue"></span></label>
      <input id="gridCount" type="range" min="2" max="12" step="1" value="6" />
    </div>
    <div class="row">
      <label for="gridSize">gridSize: <span id="gridSizeValue"></span></label>
      <input id="gridSize" type="range" min="0.8" max="8.0" step="0.1" value="0.8" />
    </div>
    <div class="row">
      <label for="cycleGridDarken">A点井字特效加深：<span id="gridDarkenValue"></span></label>
      <button id="cycleGridDarken" class="preset-btn" type="button">调色深度</button>
    </div>
    <div class="row">
      <label for="cycleTrailLength">彗星尾巴长度：<span id="trailLengthValue"></span></label>
      <button id="cycleTrailLength" class="preset-btn" type="button">调尾巴长度</button>
    </div>
    <div class="row">
      <label for="curveHeight">curveHeight: <span id="curveHeightValue"></span></label>
      <input id="curveHeight" type="range" min="1.0" max="12.0" step="0.1" value="5.5" />
    </div>
    <div class="row">
      <label for="segments">segments: <span id="segmentsValue"></span></label>
      <input id="segments" type="range" min="100" max="160" step="1" value="128" />
    </div>
    <div class="row">
      <label for="color">color</label>
      <input id="color" type="color" value="#ff3a1a" />
    </div>
    <div class="row">
      <label for="pointBrightness">pointBrightness: <span id="pointBrightnessValue"></span></label>
      <input id="pointBrightness" type="range" min="0.0" max="3.0" step="0.1" value="0.3" />
    </div>
    <div class="row">
      <label for="pointCoreSize">pointCoreSize: <span id="pointCoreSizeValue"></span></label>
      <input id="pointCoreSize" type="range" min="0.06" max="0.32" step="0.01" value="0.06" />
    </div>
    <div class="row">
      <label for="globeMode">globeMode (贴球面飞行)</label>
      <input id="globeMode" type="checkbox" />
    </div>
    <div class="row">
      <button id="applyFixedPreset" class="preset-btn" type="button">应用固定参数预设</button>
    </div>
    <div class="row">
      <button id="togglePulseMode" class="preset-btn" type="button">显示模式：同时显示</button>
    </div>
    <div class="tips">
      说明：线宽和透明度都按 sin(PI*t) 分布，保证两端尖细透明、中段更宽更亮。<br />
      你可以边调参数边看是否接近 CyberMap 风格。
    </div>
    <div class="legend">
      <div class="legend-item"><span class="swatch" style="color:#38b349;background:#38b349;"></span>OAS</div>
      <div class="legend-item"><span class="swatch" style="color:#ed1c24;background:#ed1c24;"></span>ODS</div>
      <div class="legend-item"><span class="swatch" style="color:#f26522;background:#f26522;"></span>MAV</div>
      <div class="legend-item"><span class="swatch" style="color:#0087f4;background:#0087f4;"></span>WAV</div>
      <div class="legend-item"><span class="swatch" style="color:#ec008c;background:#ec008c;"></span>IDS</div>
      <div class="legend-item"><span class="swatch" style="color:#fbf267;background:#fbf267;"></span>VUL</div>
      <div class="legend-item"><span class="swatch" style="color:#855ff4;background:#855ff4;"></span>KAS</div>
      <div class="legend-item"><span class="swatch" style="color:#0000ff;background:#0000ff;"></span>RMW</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./彗星方案2.js"></script>
</body>
</html>
